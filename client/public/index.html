<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Kairos — Login</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#0f0f17;--paper-h:#16161f;--paper-l:#24242d;
  --paper-s:#cdd0de;--paper-m:#737889;--paper-t:#f9fafb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Sora',sans-serif;
  background:var(--paper);
  color:var(--paper-t);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-container{
  background:var(--paper-h);
  border-radius:16px;
  padding:48px 40px;
  width:100%;
  max-width:420px;
  border:1px solid var(--paper-l);
  text-align:center;
}
.logo{ margin-bottom:36px; }
.logo-icon{ font-size:3rem; margin-bottom:12px; }
.brand-name{
  font-family:'Fraunces',serif;
  font-size:1.8rem;
  font-weight:700;
  margin-bottom:4px;
}
.brand-sub{
  font-size:.8rem;
  color:var(--paper-m);
}
.divider{
  height:1px;
  background:var(--paper-l);
  margin:24px 0;
}
.btn-google{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  width:100%;
  padding:14px 24px;
  border-radius:10px;
  background:#fff;
  color:#1f1f1f;
  border:none;
  font-family:'Sora',sans-serif;
  font-size:.9rem;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
  text-decoration:none;
}
.btn-google:hover{
  background:#f0f0f0;
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.btn-google svg{
  width:20px;
  height:20px;
  flex-shrink:0;
}
.info-text{
  font-size:.72rem;
  color:var(--paper-m);
  margin-top:20px;
  line-height:1.5;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <div class="brand-name">Kairos</div>
    <div class="brand-sub">Project Management — NuDesign</div>
  </div>

  <a href="/api/login" class="btn-google" data-testid="button-login-google">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Accedi con Google
  </a>

  <div class="info-text">
    Accesso riservato al team NuDesign
  </div>
</div>

<script>
(async function(){
  try {
    const res = await fetch('/api/auth/user', { credentials: 'include' });
    if(res.ok){
      const user = await res.json();
      if(user && user.id) window.location.href = '/dashboard.html';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
