<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kairos — Gantt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
<link href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css" rel="stylesheet">
<script src="api-client.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --nav-bg:#0c1a2e;
  --nav-surface:#0f2035;
  --nav-elevated:#142840;
  --nav-border:#1e3a56;
  --nav-text:#e0ecf8;
  --nav-muted:#5a7ea0;
  --nav-secondary:#8babc8;

  --g-bg:#132d4a;
  --g-surface:#102540;
  --g-border:rgba(40,120,180,.22);
  --g-border-subtle:rgba(40,120,180,.12);
  --g-text:#e0ecf8;
  --g-text-secondary:#8babc8;
  --g-text-muted:#5a7ea0;
  --g-hover:rgba(80,180,230,.1);
  --g-selected:rgba(80,180,230,.18);
  --g-weekend:rgba(10,20,40,.35);

  --accent:#50b4e6;
  --accent-soft:rgba(80,180,230,.15);
  --today-red:#e74c3c;
}

html,body{font-family:'Sora',system-ui,sans-serif;background:var(--g-bg);color:var(--g-text);font-size:14px;-webkit-font-smoothing:antialiased;height:100%;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0c1a2e}
::-webkit-scrollbar-thumb{background:#1e4a6e;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a6090}

#toolbar{display:flex;align-items:center;gap:10px;padding:0 28px;height:54px;background:var(--nav-surface);border-bottom:1px solid var(--nav-border);position:sticky;top:0;z-index:600}
.brand{display:flex;align-items:center;gap:11px}
.nav-buttons{display:flex;gap:2px;position:absolute;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.04);border-radius:10px;padding:3px}
.nav-btn{padding:5px 16px;border-radius:8px;font-size:.74rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--nav-muted);font-family:'Sora',sans-serif;transition:all .18s}
.nav-btn.active{background:var(--nav-elevated);color:var(--nav-text)}
.nav-btn:hover:not(.active){color:var(--nav-secondary);background:rgba(255,255,255,.04)}

#gantt-toolbar{display:flex;align-items:center;gap:14px;padding:8px 20px;background:var(--g-surface);border-bottom:1px solid var(--g-border)}

.toolbar-search{position:relative;flex:0 0 200px}
.toolbar-search input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--g-border);border-radius:8px;padding:6px 10px 6px 32px;color:var(--g-text);font-family:'Sora',sans-serif;font-size:.75rem;outline:none;transition:border-color .15s}
.toolbar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.toolbar-search input::placeholder{color:var(--g-text-muted)}
.toolbar-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--g-text-muted);width:15px;height:15px}

.toolbar-divider{width:1px;height:26px;background:var(--g-border);flex-shrink:0}

.filter-group{display:flex;align-items:center;gap:8px}
.filter-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid var(--g-border);border-radius:8px;padding:5px 10px;cursor:pointer;transition:all .15s}
.filter-chip:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.filter-chip svg{width:14px;height:14px;color:var(--g-text-muted)}
.filter-chip select{background:transparent;border:none;color:var(--g-text);font-family:'Sora',sans-serif;font-size:.72rem;font-weight:500;outline:none;cursor:pointer;-webkit-appearance:none;padding-right:2px}
.filter-chip select option{background:#102540;color:var(--g-text)}

.toolbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.scale-group{display:flex;background:rgba(255,255,255,.06);border:1px solid var(--g-border);border-radius:8px;overflow:hidden}
.scale-btn{padding:5px 13px;font-size:.68rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--g-text-muted);font-family:'Sora',sans-serif;transition:all .15s;border-right:1px solid var(--g-border)}
.scale-btn:last-child{border-right:none}
.scale-btn.active{background:var(--accent);color:#fff}
.scale-btn:hover:not(.active){color:var(--g-text);background:var(--g-surface)}

.today-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--g-border);background:rgba(255,255,255,.06);color:var(--g-text-secondary);font-family:'Sora',sans-serif;transition:all .15s}
.today-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.today-btn svg{width:14px;height:14px}

.expand-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--g-border);background:rgba(255,255,255,.06);color:var(--g-text-secondary);font-family:'Sora',sans-serif;transition:all .15s}
.expand-btn:hover{border-color:var(--accent);color:var(--accent)}
.expand-btn svg{width:14px;height:14px}

.counter-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:10px;background:var(--accent-soft);color:var(--accent);font-size:.65rem;font-weight:700;padding:0 6px;margin-left:4px}

#gantt_here{width:100%;height:calc(100vh - 54px - 46px)}

.gantt_container{border:none!important;background:var(--g-bg)!important;font-family:'Sora',sans-serif!important}

.gantt_grid{background:var(--g-bg)!important;border-right:1px solid var(--g-border)!important}
.gantt_grid_scale{background:var(--g-surface)!important;border-bottom:1px solid var(--g-border)!important}
.gantt_grid_scale .gantt_grid_head_cell{color:var(--g-text-muted)!important;border-right:none!important;font-family:'Sora',sans-serif!important;font-size:10px!important;font-weight:600!important;text-transform:uppercase!important;letter-spacing:.06em!important}
.gantt_grid_data .gantt_row{background:var(--g-bg)!important;border-bottom:1px solid var(--g-border-subtle)!important}
.gantt_grid_data .gantt_row.odd{background:var(--g-bg)!important}
.gantt_grid_data .gantt_cell{color:var(--g-text)!important;border-right:none!important;font-size:12px!important}
.gantt_tree_content{font-family:'Sora',sans-serif!important;font-size:12.5px!important;font-weight:400!important;color:var(--g-text)!important}

.gantt_task_scale{background:var(--g-surface)!important;border-bottom:1px solid var(--g-border)!important}
.gantt_scale_cell{background:var(--g-surface)!important;color:var(--g-text-muted)!important;border-right:1px solid var(--g-border-subtle)!important;border-bottom:none!important;font-family:'Sora',sans-serif!important;font-size:10px!important;font-weight:600!important;letter-spacing:.02em!important}
.gantt_task_bg{background:var(--g-bg)!important}
.gantt_task_row{border-bottom:1px solid var(--g-border-subtle)!important;background:var(--g-bg)!important}
.gantt_task_row.odd{background:var(--g-bg)!important}
.gantt_task_cell{border-right:1px solid var(--g-border-subtle)!important}

.gantt_row.gantt_selected,.gantt_task_row.gantt_selected{background:var(--g-selected)!important}
.gantt_grid_data .gantt_row:hover,.gantt_task_row:hover{background:var(--g-hover)!important}

.gantt_tree_icon.gantt_open,.gantt_tree_icon.gantt_close{opacity:.5}
.gantt_tree_icon.gantt_open:hover,.gantt_tree_icon.gantt_close:hover{opacity:.8}

.gantt_task_line{border-radius:8px!important;border:none!important;box-shadow:0 2px 6px rgba(0,0,0,.25);transition:box-shadow .15s,transform .15s}
.gantt_task_line:hover{box-shadow:0 4px 14px rgba(0,0,0,.35);transform:translateY(-1px)}
.gantt_task_content{font-family:'Sora',sans-serif!important;font-size:11px!important;font-weight:600!important;color:#fff!important;padding:0 10px!important;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.gantt_task_progress{border-radius:6px!important;background:rgba(0,0,0,.15)!important}
.gantt_task_progress_wrapper{border-radius:6px!important}

.gantt_row_project .gantt_tree_content{font-weight:700!important;color:#e0ecf8!important;font-size:13px!important}
.gantt_task_line.gantt_project{background:transparent!important;border:none!important;border-bottom:2px solid rgba(80,180,230,.35)!important;border-left:2px solid rgba(80,180,230,.35)!important;border-right:2px solid rgba(80,180,230,.35)!important;border-radius:0 0 3px 3px!important;box-shadow:none!important;height:8px!important;margin-top:20px!important}
.gantt_task_line.gantt_project .gantt_task_content{display:none!important}
.gantt_task_line.gantt_project .gantt_task_progress_wrapper{display:none!important}

.gantt_link_line_right,.gantt_link_line_left,.gantt_link_line_up,.gantt_link_line_down{border-color:rgba(80,180,230,.3)!important}
.gantt_link_arrow_right,.gantt_link_arrow_left{border-left-color:rgba(80,180,230,.3)!important;border-right-color:rgba(80,180,230,.3)!important}

.gantt_hor_scroll,.gantt_ver_scroll{background:#0c1a2e!important;border:none!important}
div.gantt_ver_scroll>div,div.gantt_hor_scroll>div{background:#1e4a6e!important;border-radius:3px}

.weekend{background:var(--g-weekend)!important}

.gantt_marker{background:var(--today-red)!important;width:2px!important;opacity:1;z-index:5}
.gantt_marker .gantt_marker_content{background:var(--today-red)!important;color:#fff!important;font-family:'Sora',sans-serif!important;font-size:9px!important;font-weight:700!important;padding:2px 6px!important;border-radius:0 0 4px 4px!important;box-shadow:0 2px 6px rgba(231,76,60,.3)}

.gantt_tooltip{background:#0f2035!important;border:1px solid rgba(40,120,180,.3)!important;border-radius:10px!important;box-shadow:0 8px 30px rgba(0,0,0,.4)!important;padding:12px 16px!important;color:var(--g-text)!important;font-family:'Sora',sans-serif!important;font-size:12px!important;max-width:320px}
.tt-title{font-weight:700;font-size:13px;margin-bottom:6px;line-height:1.3;color:#e0ecf8}
.tt-row{display:flex;align-items:center;gap:6px;margin:3px 0;color:#8babc8;font-size:11px}
.tt-row svg{width:13px;height:13px;flex-shrink:0}
.tt-row strong{color:#e0ecf8;font-weight:600}
.tt-progress{margin-top:6px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.tt-progress-bar{height:100%;border-radius:2px;transition:width .3s}

.cell-assignee{display:flex;align-items:center;gap:6px}
.cell-avatar{width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;border:1px solid var(--g-border)}
.cell-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.cell-name{font-size:11px;color:var(--g-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.cell-status{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.02em}
.status-nuova{background:rgba(80,180,230,.15);color:#50b4e6}
.status-in_corso{background:rgba(46,204,113,.15);color:#2ecc71}
.status-in_pausa{background:rgba(241,196,15,.15);color:#f1c40f}
.status-completata{background:rgba(46,204,113,.15);color:#2ecc71}
.status-annullata{background:rgba(231,76,60,.15);color:#e74c3c}
.status-preventivo{background:rgba(167,139,250,.15);color:#a78bfa}

.gantt_grid_data .gantt_row{height:42px!important;line-height:42px!important}
.gantt_task_row{height:42px!important}
.gantt_task_line{height:26px!important;margin-top:8px}
.gantt_grid_scale,.gantt_task_scale{line-height:38px!important}

.gantt_row.gantt_row_project{border-left:3px solid #50b4e6!important}

.gantt_task_drag{cursor:ew-resize}
.gantt_task_line .gantt_task_drag{background:transparent!important}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-box{background:#0f2035;border:1px solid rgba(40,120,180,.3);border-radius:14px;width:520px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);padding:24px 28px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:#e0ecf8}
.modal-close{background:none;border:none;color:#5a7ea0;cursor:pointer;padding:4px;border-radius:6px;transition:color .15s}
.modal-close:hover{color:#e0ecf8}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.mf-full{grid-column:1/-1}
.mf-label{display:block;font-size:.68rem;font-weight:600;color:#5a7ea0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mf-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(40,120,180,.25);border-radius:8px;padding:8px 11px;color:#e0ecf8;font-family:'Sora',sans-serif;font-size:.78rem;outline:none;transition:border-color .15s}
.mf-input:focus{border-color:#50b4e6;box-shadow:0 0 0 3px rgba(80,180,230,.15)}
.mf-input::placeholder{color:#5a7ea0}
select.mf-input{cursor:pointer;-webkit-appearance:auto}
select.mf-input option{background:#0f2035;color:#e0ecf8}
textarea.mf-input{resize:vertical;min-height:50px}
.mf-parent-info{display:none;margin-bottom:12px;padding:8px 12px;border-radius:8px;background:rgba(80,180,230,.1);border:1px solid rgba(80,180,230,.2);font-size:.72rem;color:#8babc8}
.mf-parent-info strong{color:#e0ecf8;font-weight:600}
.mf-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mf-btn{padding:8px 18px;border-radius:8px;font-family:'Sora',sans-serif;font-size:.74rem;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.mf-btn-cancel{background:rgba(255,255,255,.06);border:1px solid rgba(40,120,180,.25);color:#8babc8}
.mf-btn-cancel:hover{background:rgba(255,255,255,.1);color:#e0ecf8}
.mf-btn-save{background:#50b4e6;color:#fff}
.mf-btn-save:hover{background:#3a9cd0}
.mf-btn-delete{background:rgba(231,76,60,.12);color:#e74c3c;border:1px solid rgba(231,76,60,.25)}
.mf-btn-delete:hover{background:rgba(231,76,60,.2)}

.ctx-menu{display:none;position:fixed;z-index:800;background:#0f2035;border:1px solid rgba(40,120,180,.3);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.5);min-width:200px;padding:4px;font-family:'Sora',sans-serif}
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:6px;font-size:.76rem;font-weight:500;color:#e0ecf8;cursor:pointer;transition:background .1s}
.ctx-item:hover{background:rgba(80,180,230,.12)}
.ctx-item svg{width:15px;height:15px;color:#5a7ea0}
.ctx-divider{height:1px;background:rgba(40,120,180,.2);margin:3px 8px}
.ctx-item.danger{color:#e74c3c}
.ctx-item.danger svg{color:#e74c3c}

.gantt_grid_data .gantt_row.gantt_row_project .gantt_cell:first-child{cursor:pointer}
</style>
</head>
<body>

<div id="toolbar">
  <div class="brand">
    <img src="nudesign-logo.png" alt="NuDesign" style="height:56px;object-fit:contain">
    <span style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:1.15rem;font-weight:500;letter-spacing:.04em;color:#e0ecf8;opacity:.92">Kairos</span>
  </div>
  <div class="nav-buttons">
    <button class="nav-btn" data-testid="nav-calendario" onclick="location.href='preview.html'">Calendario</button>
    <button class="nav-btn" data-testid="nav-stato" onclick="location.href='status.html'">Stato</button>
    <button class="nav-btn" data-testid="nav-report" onclick="location.href='report.html'">Report</button>
    <button class="nav-btn" data-testid="nav-team" onclick="location.href='team.html'">Team</button>
    <button class="nav-btn" data-testid="nav-commesse" onclick="location.href='commesse.html'">Commesse</button>
    <button class="nav-btn" data-testid="nav-foglio" onclick="location.href='foglio-lavoro.html'">Foglio Lavoro</button>
    <button class="nav-btn" data-testid="nav-clienti" onclick="location.href='clienti.html'">Clienti</button>
    <button class="nav-btn active" data-testid="nav-gantt" onclick="location.href='gantt.html'">Gantt</button>
    <button class="nav-btn" data-testid="nav-review" onclick="location.href='review.html'">Review</button>
  </div>
</div>

<div id="gantt-toolbar">
  <div class="toolbar-search">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" data-testid="input-search" placeholder="Cerca commessa o fase..." oninput="applyFilters()">
  </div>

  <div class="toolbar-divider"></div>

  <div class="filter-group">
    <div class="filter-chip">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <select id="filter-client" data-testid="select-filter-client" onchange="applyFilters()">
        <option value="">Tutti i clienti</option>
      </select>
    </div>
    <div class="filter-chip">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <select id="filter-status" data-testid="select-filter-status" onchange="applyFilters()">
        <option value="">Tutti gli stati</option>
        <option value="preventivo">Preventivo</option>
        <option value="nuova">Nuova</option>
        <option value="in_corso">In corso</option>
        <option value="in_pausa">In pausa</option>
        <option value="completata">Completata</option>
        <option value="annullata">Annullata</option>
      </select>
    </div>
    <div class="filter-chip">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M3 9h6"/><path d="M3 15h6"/></svg>
      <select id="filter-department" data-testid="select-filter-department" onchange="applyFilters()">
        <option value="">Tutti i reparti</option>
      </select>
    </div>
    <div class="filter-chip">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <select id="filter-person" data-testid="select-filter-person" onchange="applyFilters()">
        <option value="">Tutte le persone</option>
      </select>
    </div>
    <span id="job-count" class="counter-badge" data-testid="text-job-count">0</span>
  </div>

  <div class="toolbar-right">
    <button class="expand-btn" data-testid="btn-expand-all" onclick="toggleExpandAll()" title="Espandi/Comprimi tutto">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      <span id="expand-label">Comprimi</span>
    </button>

    <button class="today-btn" data-testid="btn-today" onclick="goToToday()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Oggi
    </button>

    <div class="toolbar-divider"></div>

    <div class="scale-group">
      <button class="scale-btn" data-testid="btn-scale-day" onclick="setScale('day')">Giorno</button>
      <button class="scale-btn active" data-testid="btn-scale-week" onclick="setScale('week')">Settimana</button>

<div id="gantt_here" data-testid="gantt-container"></div>

<script>
const WRIKE_COLORS=[
  '#4ecdc4','#2ecc71','#a78bfa','#60a5fa','#fbbf24',
  '#f472b6','#f97316','#ef4444','#14b8a6','#8b5cf6',
  '#3b82f6','#ec4899'
];

const DEPT_COLORS={
  'ART DIRECTION':'#a78bfa',
  'CONCEPT':'#f472b6',
  'GRAFICA':'#fbbf24',
  'MODELLAZIONE':'#2ecc71',
  'SET DESIGN':'#4ecdc4',
  'PRODUZIONE 3D':'#60a5fa',
  'PRODUZIONE AI':'#8b5cf6',
  'SHOOTING':'#ef4444',
  'POST-PRODUZIONE':'#3b82f6'
};

const STATUS_LABELS={
  'nuova':'Nuova','in_corso':'In corso','in_pausa':'In pausa',
  'completata':'Completata','annullata':'Annullata','preventivo':'Preventivo'
};

const AREA_TO_CATEGORIES={
  'area_artdirection':['ART DIRECTION'],
  'area_creativita':['CONCEPT'],
  'area_grafica':['GRAFICA'],
  'area_modelli':['MODELLAZIONE'],
  'area_immagini':['PRODUZIONE 3D'],
  'area_fotografia':['SHOOTING'],
  'area_ai':['PRODUZIONE AI'],
  'area_video':['SHOOTING'],
  'area_montaggio':['POST-PRODUZIONE'],
  'area_color':['POST-PRODUZIONE'],
  'area_configuratore':['SET DESIGN']
};

let ALL_JOBS=[];
let ALL_PHASES_RAW=[];
let ALL_COLLABORATORS={};
let ALL_COLLABS_LIST=[];
let ALL_AREAS=[];
let ALL_TASK_TYPES=[];
let currentScale='week';
let allExpanded=true;
let ganttInitialized=false;
let ctxTaskId=null;

function configGantt(){
  gantt.config.date_format="%Y-%m-%d";
  gantt.config.drag_move=true;
  gantt.config.drag_resize=true;
  gantt.config.drag_progress=true;
  gantt.config.drag_links=false;
  gantt.config.show_progress=true;
  gantt.config.fit_tasks=true;
  gantt.config.auto_scheduling=false;
  gantt.config.row_height=42;
  gantt.config.bar_height=26;
  gantt.config.scale_height=56;
  gantt.config.min_column_width=40;
  gantt.config.open_tree_initially=true;
  gantt.config.scroll_size=6;
  gantt.config.show_links=false;
  gantt.config.readonly=false;
  gantt.config.smart_rendering=true;
  gantt.config.show_markers=true;

  gantt.config.columns=[
    {name:"text",label:"Title",tree:true,width:280,resize:true,
      template:function(t){
        if(t.type===gantt.config.types.project){
          const code=t.job_code||'';
          const title=t.job_title||'';
          const client=t.client_name||'';
          let html='<div style="display:flex;flex-direction:column;line-height:1.25;padding:2px 0">';
          html+='<span style="font-weight:700;font-size:12.5px;color:#e0ecf8">'+(client?'<span style="color:#50b4e6;font-weight:600">'+escHtml(client)+'</span> · ':'')+escHtml(code)+'</span>';
          if(title) html+='<span style="font-size:10px;color:#8babc8;margin-top:1px">'+escHtml(title)+'</span>';
          html+='</div>';
          return html;
        }
        return '<span style="color:#e0ecf8">'+escHtml(t.text)+'</span>';
      }
    },
    {name:"start_date",label:"Start date",align:"center",width:80,resize:true},
    {name:"end_date",label:"Due date",align:"center",width:80,resize:true},
    {name:"assigned",label:"Assignee",align:"center",width:130,resize:true,
      template:function(t){
        if(!t.assigned)return '';
        const initials=t.assigned.split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2);
        const avatarSrc=safeUrl(t.avatar_url);
        const bgColor=t.avatar_color||'#50b4e6';
        const avatar=avatarSrc
          ?'<img src="'+avatarSrc+'" alt="">'
          :initials;
        const avatarStyle=avatarSrc?'':'background:'+safeColor(bgColor)+';color:#fff;';
        return '<div class="cell-assignee"><div class="cell-avatar" style="'+avatarStyle+'">'+avatar+'</div><span class="cell-name">'+escHtml(t.assigned)+'</span></div>';
      }
    },
    {name:"status_col",label:"Status",align:"center",width:85,resize:true,
      template:function(t){
        const s=safeStatus(t.status_key||'');
        const label=t.status_label||'';
        if(!label)return '';
        return '<span class="cell-status'+(s?' status-'+s:'')+'">'+escHtml(label)+'</span>';
      }
    }
  ];

  setScale(currentScale);

  gantt.templates.task_class=function(start,end,task){
    if(task.type===gantt.config.types.project) return 'gantt_project';
    return '';
  };

  gantt.templates.task_text=function(start,end,task){
    if(task.type===gantt.config.types.project) return '';
    return escHtml(task.text);
  };

  gantt.templates.rightside_text=function(start,end,task){
    if(task.type===gantt.config.types.project) return '';
    const dur=gantt.calculateDuration(start,end);
    if(dur<=3) return '<span style="color:#8babc8;font-size:11px;font-weight:500;padding-left:6px">'+escHtml(task.text)+'</span>';
    return '';
  };

  gantt.templates.scale_cell_class=function(date){
    if(date.getDay()===0||date.getDay()===6) return 'weekend';
    return '';
  };

  gantt.templates.timeline_cell_class=function(item,date){
    if(date.getDay()===0||date.getDay()===6) return 'weekend';
    return '';
  };

  gantt.templates.tooltip_text=function(start,end,task){
    if(task.type===gantt.config.types.project){
      const status=task.status_label||'';
      return '<div class="tt-title">'+escHtml(task.text)+'</div>'
        +(status?'<div class="tt-row"><strong>Stato:</strong> '+escHtml(status)+'</div>':'')
        +'<div class="tt-row"><strong>Periodo:</strong> '+fmtDateIt(start)+' → '+fmtDateIt(end)+'</div>';
    }
    const pct=Math.round((task.progress||0)*100);
    const color=safeColor(task.color);
    return '<div class="tt-title" style="border-left:3px solid '+color+';padding-left:8px">'+escHtml(task.text)+'</div>'
      +'<div class="tt-row"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> '+fmtDateIt(start)+' → '+fmtDateIt(end)+'</div>'
      +(task.assigned?'<div class="tt-row"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <strong>'+escHtml(task.assigned)+'</strong></div>':'')
      +'<div class="tt-progress"><div class="tt-progress-bar" style="width:'+pct+'%;background:'+color+'"></div></div>'
      +'<div class="tt-row" style="justify-content:flex-end;margin-top:2px"><span style="font-size:10px;font-weight:700;color:'+color+'">'+pct+'%</span></div>';
  };

  gantt.attachEvent("onAfterTaskDrag",function(id,mode){
    const task=gantt.getTask(id);
    if(!task.phase_id)return;
    const startStr=formatDate(task.start_date);
    const endDate=new Date(task.end_date);endDate.setDate(endDate.getDate()-1);
    const endStr=formatDate(endDate);
    const phaseIdx=ALL_PHASES_RAW.findIndex(p=>p.id===task.phase_id);
    if(phaseIdx>=0){
      ALL_PHASES_RAW[phaseIdx].start_date=startStr;
      ALL_PHASES_RAW[phaseIdx].due_date=endStr;
      ALL_PHASES_RAW[phaseIdx].completed=task.progress>=1;
    }
    fetch('/api/jobs/'+task.job_id+'/phases/'+task.phase_id,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        name:task.phase_name||null,
        start_date:startStr,
        due_date:endStr,
        assigned_to:task.assigned_to||null,
        completed:task.progress>=1,
        task_type_id:task.task_type_id||null,
        color:task.color_raw||null,
        notes:task.notes||null,
        parent_phase_id:task.parent_phase_id||null
      })
    }).catch(err=>console.error('Failed to save phase:',err));
  });

  gantt.attachEvent("onTaskDblClick",function(id,e){
    const task=gantt.getTask(id);
    if(task.phase_id){
      openPhaseModal(task.job_id,task.phase_id,null);
    }else if(task.type===gantt.config.types.project){
      openPhaseModal(task.job_id,null,null);
    }
    return false;
  });

  gantt.attachEvent("onContextMenu",function(taskId,linkId,e){
    if(!taskId)return true;
    e.preventDefault();
    ctxTaskId=taskId;
    const task=gantt.getTask(taskId);
    const isProject=task.type===gantt.config.types.project;
    const isPhase=!!task.phase_id;
    const isSubPhase=!!task.parent_phase_id;

    document.getElementById('ctx-add-sub').style.display=(isPhase&&!isSubPhase)?'flex':'none';
    document.getElementById('ctx-edit').style.display=isPhase?'flex':'none';
    document.getElementById('ctx-divider-del').style.display=isPhase?'block':'none';
    document.getElementById('ctx-delete').style.display=isPhase?'flex':'none';

    const menu=document.getElementById('ctx-menu');
    menu.style.display='block';
    menu.style.left=Math.min(e.clientX,window.innerWidth-220)+'px';
    menu.style.top=Math.min(e.clientY,window.innerHeight-200)+'px';
    return false;
  });
}

function escHtml(s){
  if(!s)return '';
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function safeColor(c){
  if(!c)return '#50b4e6';
  if(/^#[0-9a-fA-F]{3,8}$/.test(c))return c;
  if(/^rgba?\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*(,\s*[\d.]+\s*)?\)$/.test(c))return c;
  return '#50b4e6';
}

function safeStatus(s){
  const allowed=['nuova','in_corso','in_pausa','completata','annullata','preventivo'];
  return allowed.includes(s)?s:'';
}

function safeUrl(u){
  if(!u)return '';
  if(u.startsWith('/')||u.startsWith('https://')||u.startsWith('http://'))return encodeURI(u);
  return '';
}

function fmtDateIt(d){
  if(!d)return '';
  const months=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  return d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
}

function formatDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function setScale(scale){
  currentScale=scale;
  document.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-testid="btn-scale-'+scale+'"]')?.classList.add('active');

  if(scale==='day'){
    gantt.config.scales=[
      {unit:"month",step:1,format:"%F %Y"},
      {unit:"day",step:1,format:"%j",css:function(date){
        const day=['D','L','M','M','G','V','S'][date.getDay()];
        return '';
      }},
    ];
    gantt.config.min_column_width=28;
    gantt.config.scale_height=56;
  }else if(scale==='week'){
    gantt.config.scales=[
      {unit:"month",step:1,format:function(date){
        const months=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
        return months[date.getMonth()];
      }},
      {unit:"week",step:1,format:function(date){
        const d=date.getDate();
        const w=Math.ceil(d/7);
        return 'W'+w;
      }}
    ];
    gantt.config.min_column_width=50;
    gantt.config.scale_height=56;
  }else if(scale==='month'){
    gantt.config.scales=[
      {unit:"year",step:1,format:"%Y"},
      {unit:"month",step:1,format:"%M"}
    ];
    gantt.config.min_column_width=55;
    gantt.config.scale_height=50;
  }else if(scale==='quarter'){
    gantt.config.scales=[
      {unit:"year",step:1,format:"%Y"},
      {unit:"quarter",step:1,format:function(date){
        return "Q"+(Math.floor(date.getMonth()/3)+1);
      }}
    ];
    gantt.config.min_column_width=80;
    gantt.config.scale_height=50;
  }

  if(ganttInitialized) gantt.render();
}

function goToToday(){
  gantt.showDate(new Date());
}

function toggleExpandAll(){
  allExpanded=!allExpanded;
  if(allExpanded){
    gantt.eachTask(function(t){gantt.open(t.id);});
    document.getElementById('expand-label').textContent='Comprimi';
  }else{
    gantt.eachTask(function(t){gantt.close(t.id);});
    document.getElementById('expand-label').textContent='Espandi';
  }
}

document.addEventListener('click',function(e){
  const ctx=document.getElementById('ctx-menu');
  if(!ctx.contains(e.target)) ctx.style.display='none';
});

function hideCtx(){document.getElementById('ctx-menu').style.display='none'}

function ctxAddPhase(){
  hideCtx();
  if(!ctxTaskId)return;
  const task=gantt.getTask(ctxTaskId);
  const jobId=task.job_id||(ctxTaskId.startsWith('job_')?parseInt(ctxTaskId.replace('job_','')):null);
  if(jobId) openPhaseModal(jobId,null,null);
}

function ctxAddSubPhase(){
  hideCtx();
  if(!ctxTaskId)return;
  const task=gantt.getTask(ctxTaskId);
  if(task.phase_id) openPhaseModal(task.job_id,null,task.phase_id);
}

function ctxEditPhase(){
  hideCtx();
  if(!ctxTaskId)return;
  const task=gantt.getTask(ctxTaskId);
  if(task.phase_id) openPhaseModal(task.job_id,task.phase_id,null);
}

function ctxDeletePhase(){
  hideCtx();
  if(!ctxTaskId)return;
  const task=gantt.getTask(ctxTaskId);
  if(!task.phase_id)return;
  if(!confirm('Eliminare questa fase?'))return;
  fetch('/api/jobs/'+task.job_id+'/phases/'+task.phase_id,{method:'DELETE'})
    .then(()=>refreshGanttData())
    .catch(err=>console.error('Delete failed:',err));
}

async function loadFormData(){
  if(!ALL_AREAS.length){
    try{ALL_AREAS=await fetch('/api/areas').then(r=>r.json())}catch(e){ALL_AREAS=[]}
  }
  if(!ALL_TASK_TYPES.length){
    try{ALL_TASK_TYPES=await fetch('/api/task-types').then(r=>r.json())}catch(e){ALL_TASK_TYPES=[]}
  }
}

function openPhaseModal(jobId,phaseId,parentPhaseId){
  loadFormData().then(()=>{
    const areaSel=document.getElementById('mf-area');
    areaSel.innerHTML='<option value="">-- Seleziona reparto --</option>';
    ALL_AREAS.forEach(a=>{
      const opt=document.createElement('option');
      opt.value=a.id;opt.textContent=(a.icon||'')+' '+a.name;
      areaSel.appendChild(opt);
    });

    const assignSel=document.getElementById('mf-assigned');
    assignSel.innerHTML='<option value="">-- Nessuno --</option>';
    ALL_COLLABS_LIST.forEach(c=>{
      const opt=document.createElement('option');
      opt.value=c.id;opt.textContent=c.name;
      assignSel.appendChild(opt);
    });

    document.getElementById('mf-parent-id').value=parentPhaseId||'';
    const parentInfo=document.getElementById('mf-parent-info');
    if(parentPhaseId){
      const parent=ALL_PHASES_RAW.find(p=>p.id==parentPhaseId);
      document.getElementById('mf-parent-label').textContent=parent?(parent.task_type_name||parent.name):'';
      parentInfo.style.display='block';
    }else{
      parentInfo.style.display='none';
    }

    if(phaseId){
      const phase=ALL_PHASES_RAW.find(p=>p.id==phaseId);
      if(!phase)return;
      document.getElementById('modal-title').textContent=phase.parent_phase_id?'Modifica Sottolavorazione':'Modifica Fase';
      document.getElementById('mf-submit-btn').textContent='Aggiorna';
      document.getElementById('mf-delete-btn').style.display='block';
      document.getElementById('mf-id').value=phase.id;
      document.getElementById('mf-job-id').value=jobId;
      document.getElementById('mf-name').value=phase.name||'';
      const phCat=phase.task_type_category||'';
      const matchArea=Object.entries(AREA_TO_CATEGORIES).find(([,cats])=>cats.includes(phCat));
      areaSel.value=matchArea?matchArea[0]:'';
      onGanttAreaChange();
      document.getElementById('mf-task-type').value=phase.task_type_id||'';
      document.getElementById('mf-start').value=phase.start_date||'';
      document.getElementById('mf-due').value=phase.due_date||'';
      document.getElementById('mf-assigned').value=phase.assigned_to||'';
      document.getElementById('mf-color').value=phase.color||'#4ecdc4';
      document.getElementById('mf-notes').value=phase.notes||'';
      document.getElementById('mf-parent-id').value=phase.parent_phase_id||'';
      if(phase.parent_phase_id){
        const par=ALL_PHASES_RAW.find(p=>p.id==phase.parent_phase_id);
        document.getElementById('mf-parent-label').textContent=par?(par.task_type_name||par.name):'';
        parentInfo.style.display='block';
      }
    }else{
      document.getElementById('modal-title').textContent=parentPhaseId?'Aggiungi Sottolavorazione':'Aggiungi Fase';
      document.getElementById('mf-submit-btn').textContent='Salva';
      document.getElementById('mf-delete-btn').style.display='none';
      document.getElementById('phase-form').reset();
      document.getElementById('mf-id').value='';
      document.getElementById('mf-job-id').value=jobId;
      document.getElementById('mf-parent-id').value=parentPhaseId||'';
      document.getElementById('mf-color').value=WRIKE_COLORS[ALL_PHASES_RAW.length%WRIKE_COLORS.length];
      onGanttAreaChange();
    }
    document.getElementById('phase-modal').style.display='flex';
  });
}

function closeModal(){document.getElementById('phase-modal').style.display='none'}

function onGanttAreaChange(){
  const areaId=document.getElementById('mf-area').value;
  const sel=document.getElementById('mf-task-type');
  const prev=sel.value;
  sel.innerHTML='<option value="">-- Seleziona lavorazione --</option>';
  const cats=AREA_TO_CATEGORIES[areaId]||[];
  const filtered=cats.length?ALL_TASK_TYPES.filter(t=>cats.includes(t.category)):ALL_TASK_TYPES;
  filtered.forEach(t=>{
    const opt=document.createElement('option');
    opt.value=t.id;opt.textContent=t.name;
    sel.appendChild(opt);
  });
  if(filtered.find(t=>t.id===prev))sel.value=prev;

  const area=ALL_AREAS.find(a=>a.id===areaId);
  if(area&&area.color){
    document.getElementById('mf-color').value=area.color;
  }
}

async function submitPhaseForm(e){
  e.preventDefault();
  const jobId=document.getElementById('mf-job-id').value;
  const phaseId=document.getElementById('mf-id').value;
  const parentId=document.getElementById('mf-parent-id').value||null;
  let startDate=document.getElementById('mf-start').value||null;
  let dueDate=document.getElementById('mf-due').value||null;
  if(!startDate){
    startDate=formatDate(new Date());
    document.getElementById('mf-start').value=startDate;
  }
  if(!dueDate){
    const d=new Date(startDate);d.setDate(d.getDate()+7);
    dueDate=formatDate(d);
    document.getElementById('mf-due').value=dueDate;
  }
  if(dueDate<startDate){
    alert('La data fine deve essere uguale o successiva alla data inizio.');
    return;
  }
  const payload={
    name:document.getElementById('mf-name').value.trim(),
    task_type_id:document.getElementById('mf-task-type').value||null,
    start_date:startDate,
    due_date:dueDate,
    assigned_to:document.getElementById('mf-assigned').value||null,
    color:document.getElementById('mf-color').value||'#4ecdc4',
    notes:document.getElementById('mf-notes').value.trim()||null,
    order_index:phaseId?undefined:ALL_PHASES_RAW.length,
    parent_phase_id:parentId
  };
  if(!payload.name)return;
  try{
    let res;
    if(phaseId){
      res=await fetch('/api/jobs/'+jobId+'/phases/'+phaseId,{
        method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)
      });
    }else{
      res=await fetch('/api/jobs/'+jobId+'/phases',{
        method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)
      });
    }
    if(!res.ok) throw new Error('Server error: '+res.status);
    closeModal();
    await refreshGanttData();
  }catch(err){
    console.error('Save phase error:',err);
    alert('Errore nel salvataggio: '+err.message);
  }
}

async function deletePhase(){
  const jobId=document.getElementById('mf-job-id').value;
  const phaseId=document.getElementById('mf-id').value;
  if(!phaseId||!confirm('Eliminare questa fase?'))return;
  try{
    const res=await fetch('/api/jobs/'+jobId+'/phases/'+phaseId,{method:'DELETE'});
    if(!res.ok) throw new Error('Server error: '+res.status);
    closeModal();
    await refreshGanttData();
  }catch(err){
    console.error('Delete phase error:',err);
    alert('Errore nella cancellazione: '+err.message);
  }
}

async function refreshGanttData(){
  try{
    const [jobs,phases]=await Promise.all([
      fetch('/api/jobs').then(r=>r.json()),
      fetch('/api/all-phases').then(r=>r.json())
    ]);
    ALL_JOBS=jobs;
    ALL_PHASES_RAW=phases;
    applyFilters();
  }catch(err){
    console.error('Refresh error:',err);
  }
}

function buildGanttData(jobs,phases){
  const tasks=[];

  const phasesByJob={};
  phases.forEach(p=>{
    if(!phasesByJob[p.job_id])phasesByJob[p.job_id]=[];
    phasesByJob[p.job_id].push(p);
  });

  let colorIdx=0;

  jobs.forEach(j=>{
    const jobPhases=phasesByJob[j.id]||[];
    const topPhases=jobPhases.filter(p=>!p.parent_phase_id);

    let jobStart=j.started_at||j.start_date;
    let jobEnd=j.due_date||j.end_date;

    if(topPhases.length>0){
      const phaseStarts=topPhases.filter(p=>p.start_date).map(p=>p.start_date);
      const phaseEnds=topPhases.filter(p=>p.due_date).map(p=>p.due_date);
      if(phaseStarts.length) jobStart=jobStart||phaseStarts.sort()[0];
      if(phaseEnds.length) jobEnd=jobEnd||phaseEnds.sort().reverse()[0];
    }

    if(!jobStart) jobStart=formatDate(new Date());
    if(!jobEnd){
      const d=new Date(jobStart);d.setDate(d.getDate()+7);
      jobEnd=formatDate(d);
    }

    const endD=new Date(jobEnd);endD.setDate(endD.getDate()+1);

    tasks.push({
      id:'job_'+j.id,
      text:(j.client?j.client+' · ':'')+j.code+(j.title?' — '+j.title:''),
      job_code:j.code||'',
      job_title:j.title||'',
      client_name:j.client||'',
      start_date:jobStart,
      end_date:formatDate(endD),
      type:gantt.config.types.project,
      open:true,
      status_key:j.status||'',
      status_label:STATUS_LABELS[j.status]||j.status||'',
      assigned:j.pm_name||'',
      avatar_url:null,
      avatar_color:null,
      job_id:j.id,
      progress:0
    });

    topPhases.forEach((p,pi)=>{
      if(!p.start_date||!p.due_date)return;
      const phEnd=new Date(p.due_date);phEnd.setDate(phEnd.getDate()+1);
      const cat=p.task_type_category||'';
      const color=p.color||DEPT_COLORS[cat]||WRIKE_COLORS[colorIdx%WRIKE_COLORS.length];
      colorIdx++;
      const collab=ALL_COLLABORATORS[p.assigned_to];

      tasks.push({
        id:'phase_'+p.id,
        text:p.task_type_name||p.name,
        phase_name:p.name,
        start_date:p.start_date,
        end_date:formatDate(phEnd),
        parent:'job_'+j.id,
        type:gantt.config.types.task,
        progress:p.completed?1:0,
        color:color,
        textColor:'#fff',
        assigned:p.assigned_name||'',
        avatar_url:collab?.avatar||null,
        avatar_color:color,
        status_key:p.completed?'completata':'in_corso',
        status_label:p.completed?'Completata':'',
        phase_id:p.id,
        job_id:j.id,
        assigned_to:p.assigned_to,
        task_type_id:p.task_type_id,
        color_raw:p.color,
        notes:p.notes,
        parent_phase_id:p.parent_phase_id
      });

      const subPhases=jobPhases.filter(sp=>sp.parent_phase_id===p.id);
      subPhases.forEach(sp=>{
        if(!sp.start_date||!sp.due_date)return;
        const spEnd=new Date(sp.due_date);spEnd.setDate(spEnd.getDate()+1);
        const spCat=sp.task_type_category||'';
        const spColor=sp.color||DEPT_COLORS[spCat]||color;
        const spCollab=ALL_COLLABORATORS[sp.assigned_to];

        tasks.push({
          id:'phase_'+sp.id,
          text:sp.task_type_name||sp.name,
          phase_name:sp.name,
          start_date:sp.start_date,
          end_date:formatDate(spEnd),
          parent:'phase_'+p.id,
          type:gantt.config.types.task,
          progress:sp.completed?1:0,
          color:spColor,
          textColor:'#fff',
          assigned:sp.assigned_name||'',
          avatar_url:spCollab?.avatar||null,
          avatar_color:spColor,
          status_key:sp.completed?'completata':'in_corso',
          status_label:sp.completed?'Completata':'',
          phase_id:sp.id,
          job_id:j.id,
          assigned_to:sp.assigned_to,
          task_type_id:sp.task_type_id,
          color_raw:sp.color,
          notes:sp.notes,
          parent_phase_id:sp.parent_phase_id
        });
      });
    });
  });

  return {data:tasks,links:[]};
}

function applyFilters(){
  const client=document.getElementById('filter-client').value;
  const status=document.getElementById('filter-status').value;
  const search=document.getElementById('search-input').value.toLowerCase().trim();
  const department=document.getElementById('filter-department').value;
  const person=document.getElementById('filter-person').value;

  let jobs=[...ALL_JOBS];
  if(client) jobs=jobs.filter(j=>j.client===client);
  if(status) jobs=jobs.filter(j=>j.status===status);
  if(search){
    const matchingJobIds=new Set();
    jobs.forEach(j=>{
      const txt=(j.code+' '+j.title+' '+j.client).toLowerCase();
      if(txt.includes(search)) matchingJobIds.add(j.id);
    });
    ALL_PHASES_RAW.forEach(p=>{
      const txt=((p.name||'')+' '+(p.task_type_name||'')+' '+(p.assigned_name||'')).toLowerCase();
      if(txt.includes(search)) matchingJobIds.add(p.job_id);
    });
    jobs=jobs.filter(j=>matchingJobIds.has(j.id));
  }

  let filteredPhases=ALL_PHASES_RAW;
  if(department){
    const area=ALL_AREAS.find(a=>a.id===department);
    const cats=area?AREA_TO_CATEGORIES[area.id]||[]:[];
    if(cats.length){
      filteredPhases=filteredPhases.filter(p=>cats.includes(p.task_type_category));
    }
  }
  if(person){
    filteredPhases=filteredPhases.filter(p=>String(p.assigned_to)===String(person));
  }

  if(department||person){
    const jobIdsWithPhases=new Set(filteredPhases.map(p=>p.job_id));
    jobs=jobs.filter(j=>jobIdsWithPhases.has(j.id));
  }

  document.getElementById('job-count').textContent=jobs.length;

  const data=buildGanttData(jobs,filteredPhases);
  gantt.clearAll();
  gantt.parse(data);
  addTodayMarker();
}

let _todayMarkerId=null;
function addTodayMarker(){
  if(!gantt.addMarker) return;
  try{
    if(_todayMarkerId && gantt.deleteMarker){
      gantt.deleteMarker(_todayMarkerId);
      _todayMarkerId=null;
    }
    _todayMarkerId=gantt.addMarker({
      start_date:new Date(),
      css:"today-marker",
      text:"Oggi",
      title:"Oggi"
    });
  }catch(e){console.warn('Marker not supported:',e)}
}

async function init(){
  try{
    const [jobs,phases,collabs]=await Promise.all([
      fetch('/api/jobs').then(r=>r.json()),
      fetch('/api/all-phases').then(r=>r.json()),
      fetch('/api/collaborators').then(r=>r.json()).catch(()=>[])
    ]);
    ALL_JOBS=jobs;
    ALL_PHASES_RAW=phases;

    ALL_COLLABS_LIST=collabs;
    collabs.forEach(c=>{
      ALL_COLLABORATORS[c.id]={name:c.name,avatar:c.avatar||null};
    });

    const clients=[...new Set(jobs.map(j=>j.client))].filter(Boolean).sort();
    const clientSel=document.getElementById('filter-client');
    clientSel.innerHTML='<option value="">Tutti i clienti</option>';
    clients.forEach(c=>{
      const opt=document.createElement('option');
      opt.value=c;opt.textContent=c;
      clientSel.appendChild(opt);
    });

    try{ALL_AREAS=await fetch('/api/areas').then(r=>r.json())}catch(e){ALL_AREAS=[]}
    const deptSel=document.getElementById('filter-department');
    deptSel.innerHTML='<option value="">Tutti i reparti</option>';
    ALL_AREAS.forEach(a=>{
      const opt=document.createElement('option');
      opt.value=a.id;opt.textContent=(a.icon||'')+' '+a.name;
      deptSel.appendChild(opt);
    });

    const personSel=document.getElementById('filter-person');
    personSel.innerHTML='<option value="">Tutte le persone</option>';
    ALL_COLLABS_LIST.forEach(c=>{
      const opt=document.createElement('option');
      opt.value=c.id;opt.textContent=c.name;
      personSel.appendChild(opt);
    });

    document.getElementById('job-count').textContent=jobs.length;

    configGantt();
    gantt.init("gantt_here");
    ganttInitialized=true;

    const data=buildGanttData(jobs,phases);
    gantt.parse(data);

    addTodayMarker();
    gantt.showDate(new Date());
  }catch(e){
    console.error('Gantt init error:',e);
  }
}

init();
</script>
