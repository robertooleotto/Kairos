<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Kairos — Review</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5f5f0;--paper-h:#ebebdf;--paper-l:#d5d5ca;
  --paper-s:#3a3a42;--paper-m:#8a8a95;--paper-t:#1a1a24;
  --accent:#6366f1;--accent-h:#5558e3;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--cyan:#06b6d4;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--paper);color:var(--paper-t);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}

.header{padding:14px 24px;border-bottom:1px solid var(--paper-l);display:flex;align-items:center;gap:16px;background:var(--paper);z-index:100;flex-shrink:0}
.brand{flex-shrink:0;display:flex;align-items:center;gap:10px}
.nav-pills{display:flex;gap:2px;background:rgba(0,0,0,.04);border-radius:10px;padding:3px;position:absolute;left:50%;transform:translateX(-50%)}
.nav-pill{padding:5px 16px;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--paper-m);font-family:'Sora',sans-serif;transition:all .15s}
.nav-pill.active{background:#fff;color:var(--paper-t);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.nav-pill:hover:not(.active){color:var(--paper-s)}

.toolbar{padding:10px 24px;border-bottom:1px solid var(--paper-l);display:flex;align-items:center;gap:12px;background:var(--paper-h);flex-shrink:0}
.toolbar select{background:#fff;color:var(--paper-t);border:1px solid var(--paper-l);border-radius:6px;padding:6px 12px;font-size:.72rem;font-family:'Sora',sans-serif;cursor:pointer;min-width:200px}
.toolbar select:focus{outline:none;border-color:var(--accent)}
.toolbar-label{font-size:.62rem;color:var(--paper-m);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.toolbar-info{font-size:.62rem;color:var(--paper-m);margin-left:auto}

.main-area{flex:1;position:relative;overflow:hidden}

.gallery-panel{position:absolute;inset:0;overflow-y:auto;padding:20px 24px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.gallery-card{background:#fff;border:1px solid var(--paper-l);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .12s,box-shadow .12s;position:relative}
.gallery-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(99,102,241,.1)}
.gallery-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.gallery-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--paper-h)}
.gallery-info{padding:8px 10px}
.gallery-title{font-size:.7rem;font-weight:600;color:var(--paper-t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gallery-meta{font-size:.58rem;color:var(--paper-m);margin-top:2px}
.gallery-phase{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.52rem;font-weight:600;background:rgba(99,102,241,.08);color:var(--accent);margin-top:3px}

.gallery-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--paper-m);gap:12px}
.gallery-empty svg{width:48px;height:48px;opacity:.3}
.gallery-empty h3{font-family:'Fraunces',serif;font-size:1.1rem;color:var(--paper-s)}

.viewer-panel{position:absolute;inset:0;background:#0a0a12;display:flex;flex-direction:column;z-index:20;opacity:0;pointer-events:none;transform:translateX(20px);transition:opacity .15s,transform .15s}
.viewer-panel.open{opacity:1;pointer-events:auto;transform:translateX(0)}
.viewer-body{flex:1;display:flex;overflow:hidden;min-height:0}

.viewer-toolbar{padding:10px 18px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;gap:12px;z-index:10;flex-shrink:0}
.viewer-title{font-size:.82rem;font-weight:600;flex:1;color:#fff}
.viewer-meta{font-size:.62rem;color:#888}
.tool-btn{padding:6px 12px;border-radius:7px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid #333;background:transparent;color:#ccc;font-family:'Sora',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.tool-btn:hover{border-color:var(--accent);color:var(--accent)}
.tool-btn.active{background:rgba(99,102,241,.15);border-color:var(--accent);color:var(--accent)}
.tool-btn svg{width:14px;height:14px}
.close-viewer-btn{padding:6px 10px;border-radius:7px;font-size:1rem;cursor:pointer;border:1px solid #333;background:transparent;color:#ccc;font-family:'Sora',sans-serif;transition:all .15s;line-height:1}
.close-viewer-btn:hover{color:#fff;border-color:#666}

.viewer-canvas{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:grab}
.viewer-canvas.grabbing{cursor:grabbing}
.canvas-wrap{position:relative;transform-origin:0 0;will-change:transform}
.canvas-image{display:block;user-select:none;border-radius:4px;position:relative;z-index:1;max-width:none;max-height:none}

.zoom-controls{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10;background:rgba(0,0,0,.6);border-radius:8px;padding:4px;backdrop-filter:blur(6px)}
.zoom-btn{width:32px;height:28px;border-radius:6px;border:none;background:transparent;color:#ccc;cursor:pointer;font-size:.72rem;font-weight:600;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;transition:all .1s}
.zoom-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.zoom-btn.active{background:rgba(99,102,241,.2);color:var(--accent)}
.zoom-btn svg{width:14px;height:14px}
.zoom-level{color:#999;font-size:.6rem;font-weight:600;display:flex;align-items:center;padding:0 6px;min-width:40px;justify-content:center;user-select:none}

.pin-marker{position:absolute;width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transform:translate(-50%,-50%);z-index:5;box-shadow:0 2px 8px rgba(99,102,241,.5);border:2px solid #fff;transition:transform .15s}
.pin-marker:hover{transform:translate(-50%,-50%) scale(1.2)}
.pin-marker.resolved{background:var(--green);box-shadow:0 2px 8px rgba(34,197,94,.5)}
.pin-marker.active-pin{background:#fff;color:var(--accent);transform:translate(-50%,-50%) scale(1.25)}

.comments-sidebar{width:320px;min-width:320px;border-left:1px solid #222;display:flex;flex-direction:column;background:#111;flex-shrink:0;overflow:hidden}
.comments-header{padding:12px 16px;border-bottom:1px solid #222;display:flex;align-items:center;gap:8px}
.comments-header h3{font-size:.78rem;font-weight:600;flex:1;color:#fff}
.comment-count{background:rgba(99,102,241,.15);color:var(--accent);padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700}

.comments-list{flex:1;overflow-y:auto;padding:10px}
.comment-item{padding:10px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid #222;margin-bottom:6px}
.comment-item.highlighted{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.06)}
.comment-item.resolved-comment{opacity:.5}
.comment-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.comment-pin-num{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.comment-author{font-size:.68rem;font-weight:600;flex:1;color:#ddd}
.comment-time{font-size:.56rem;color:#666}
.comment-body{font-size:.7rem;color:#aaa;line-height:1.5;margin-bottom:4px}
.comment-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.5rem;font-weight:700;margin-right:4px;vertical-align:middle;text-transform:uppercase;letter-spacing:.03em}
.tag-correzione{background:rgba(245,158,11,.15);color:var(--yellow)}
.tag-approvato{background:rgba(34,197,94,.15);color:var(--green)}
.tag-problema{background:rgba(239,68,68,.15);color:var(--red)}
.tag-nota{background:rgba(99,102,241,.15);color:var(--accent)}
.tag-domanda{background:rgba(6,182,212,.15);color:var(--cyan)}
.comment-actions{display:flex;gap:4px}
.comment-action-btn{padding:2px 6px;border-radius:4px;font-size:.56rem;font-weight:600;cursor:pointer;border:1px solid #333;background:transparent;color:#888;font-family:'Sora',sans-serif}
.comment-action-btn:hover{color:#ddd;border-color:#555}

.comment-input-area{padding:10px;border-top:1px solid #222}
.comment-form-row{display:flex;gap:6px;margin-bottom:6px}
.comment-select{background:rgba(255,255,255,.05);border:1px solid #333;border-radius:5px;padding:4px 8px;color:#ccc;font-family:'Sora',sans-serif;font-size:.62rem;cursor:pointer;outline:none;flex:1}
.comment-select:focus{border-color:var(--accent)}
.comment-select option{background:#111;color:#ccc}
.comment-textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid #333;border-radius:6px;padding:8px 10px;color:#eee;font-family:'Sora',sans-serif;font-size:.7rem;outline:none;resize:none;min-height:56px}
.comment-textarea:focus{border-color:var(--accent)}
.comment-textarea::placeholder{color:#555}
.comment-submit-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.comment-submit-btn{padding:6px 14px;border-radius:6px;font-size:.68rem;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:#fff;font-family:'Sora',sans-serif;margin-left:auto}
.comment-submit-btn:disabled{opacity:.4;cursor:not-allowed}
.pin-hint{font-size:.56rem;color:#666;font-style:italic}

.nav-arrows{position:absolute;top:50%;display:flex;justify-content:space-between;width:100%;padding:0 8px;z-index:10;transform:translateY(-50%);pointer-events:none}
.nav-arrow{pointer-events:auto;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .15s}
.nav-arrow:hover{background:rgba(0,0,0,.8);border-color:rgba(255,255,255,.3)}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <img src="nudesign-logo.png" alt="NuDesign" style="height:56px;object-fit:contain" data-testid="img-logo">
    <span style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:1.15rem;font-weight:500;letter-spacing:.04em;color:var(--paper-t);opacity:.92">Kairos</span>
  </div>
  <div class="nav-pills">
    <button class="nav-pill" onclick="location.href='preview.html'" data-testid="nav-calendario">Calendario</button>
    <button class="nav-pill" onclick="location.href='status.html'" data-testid="nav-stato">Stato</button>
    <button class="nav-pill" onclick="location.href='commesse.html'" data-testid="nav-commesse">Commesse</button>
    <button class="nav-pill" onclick="location.href='foglio-lavoro.html'" data-testid="nav-foglio">Foglio Lavoro</button>
    <button class="nav-pill" onclick="location.href='gantt.html'" data-testid="nav-gantt">Gantt</button>
    <button class="nav-pill" onclick="location.href='team.html'" data-testid="nav-team">Team</button>
    <button class="nav-pill" onclick="location.href='clienti.html'" data-testid="nav-clienti">Clienti</button>
    <button class="nav-pill" onclick="location.href='report.html'" data-testid="nav-report">Report</button>
    <button class="nav-pill active" data-testid="nav-review">Review</button>
  </div>
  <div style="margin-left:auto"></div>
</div>

<div class="toolbar" id="toolbar">
  <span class="toolbar-label">Commessa</span>
  <select id="job-select" data-testid="select-job" onchange="onJobChange()">
    <option value="">— Seleziona commessa —</option>
  </select>
  <span class="toolbar-label">Fase</span>
  <select id="phase-select" data-testid="select-phase" onchange="onPhaseChange()">
    <option value="">Tutte le fasi</option>
  </select>
  <span class="toolbar-info" id="toolbar-info"></span>
</div>

<div class="main-area">
  <div class="gallery-panel" id="gallery-panel">
    <div class="gallery-empty" id="gallery-empty" data-testid="gallery-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <h3>Review & Proofing</h3>
      <p style="font-size:.72rem">Seleziona una commessa per visualizzare le revisioni</p>
    </div>
    <div class="gallery-grid" id="gallery-grid" style="display:none" data-testid="gallery-grid"></div>
  </div>

  <div class="viewer-panel" id="viewer-panel">
    <div class="viewer-toolbar" id="viewer-toolbar">
      <div>
        <div class="viewer-title" id="viewer-title" data-testid="text-viewer-title"></div>
        <div class="viewer-meta" id="viewer-meta"></div>
      </div>
      <div style="flex:1"></div>
      <button class="tool-btn" id="btn-pin-mode" data-testid="btn-pin-mode" onclick="togglePinMode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Annota
      </button>
      <button class="close-viewer-btn" onclick="closeViewer()" data-testid="btn-close-viewer">&times;</button>
    </div>
    <div class="viewer-body">
      <div class="viewer-canvas" id="viewer-canvas">
        <div class="nav-arrows">
          <button class="nav-arrow" onclick="navImage(-1)" data-testid="btn-prev-image">&larr;</button>
          <button class="nav-arrow" onclick="navImage(1)" data-testid="btn-next-image">&rarr;</button>
        </div>
        <div class="zoom-controls" data-testid="zoom-controls">
          <button class="zoom-btn" onclick="zoomTo(zoomLevel-0.25)" data-testid="btn-zoom-out" title="Zoom out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <span class="zoom-level" id="zoom-level" data-testid="text-zoom-level">Fit</span>
          <button class="zoom-btn" onclick="zoomTo(zoomLevel+0.25)" data-testid="btn-zoom-in" title="Zoom in">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <button class="zoom-btn" onclick="zoomFit()" data-testid="btn-zoom-fit" title="Adatta">Fit</button>
          <button class="zoom-btn" onclick="zoomTo(1)" data-testid="btn-zoom-100" title="100%">1:1</button>
          <button class="zoom-btn" onclick="zoomTo(2)" data-testid="btn-zoom-200" title="200%">2x</button>
        </div>
      </div>
      <div class="comments-sidebar" id="comments-sidebar">
        <div class="comments-header">
          <h3>Commenti</h3>
          <span class="comment-count" id="comment-count" data-testid="text-comment-count">0</span>
        </div>
        <div class="comments-list" id="comments-list" data-testid="comments-list"></div>
        <div class="comment-input-area">
          <div class="comment-form-row">
            <select class="comment-select" id="comment-author" data-testid="select-comment-author">
              <option value="Art Director">Art Director</option>
              <option value="Reviewer">Reviewer</option>
              <option value="Cliente">Cliente</option>
              <option value="PM">PM</option>
              <option value="Fotografo">Fotografo</option>
              <option value="Post-produzione">Post-produzione</option>
            </select>
            <select class="comment-select" id="comment-tag" data-testid="select-comment-tag">
              <option value="">Nessun tag</option>
              <option value="correzione">Correzione</option>
              <option value="problema">Problema</option>
              <option value="nota">Nota</option>
              <option value="domanda">Domanda</option>
              <option value="approvato">Approvato</option>
            </select>
          </div>
          <textarea class="comment-textarea" id="comment-input" data-testid="input-comment" placeholder="Scrivi una nota di revisione..."></textarea>
          <div class="comment-submit-row">
            <span class="pin-hint" id="pin-hint"></span>
            <button class="comment-submit-btn" id="btn-submit-comment" data-testid="btn-submit-comment" onclick="submitComment()" disabled>Invia</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="api-client.js"></script>
<script>
let allJobs = [];
let currentJobId = null;
let currentPhase = '';
let allRevisions = [];
let filteredRevisions = [];
let allImages = [];
let allColumns = [];
let currentRevision = null;
let currentComments = [];
let pinMode = false;
let pendingPin = null;
let replyToId = null;

let zoomLevel = 0;
let zoomFitScale = 1;
let panX = 0, panY = 0;
let isPanning = false;
let panStart = { x: 0, y: 0, px: 0, py: 0 };

const TAG_LABELS = {
  correzione: 'Correzione',
  problema: 'Problema',
  nota: 'Nota',
  domanda: 'Domanda',
  approvato: 'Approvato'
};

const PHASE_LABELS = {
  'location_bozza': 'Location Bozza',
  'location_def': 'Location Def',
  'fotografia': 'Fotografia',
  'styling': 'Styling',
  'revisioni': 'Revisioni',
  'render': 'Render',
  'post': 'Post',
  'finiture': 'Finiture',
  'rifacimenti': 'Rifacimenti',
  'recupero_render': 'Render (Rec.)',
  'recupero_post': 'Post (Rec.)',
  'recupero_finiture': 'Finiture (Rec.)',
  'recupero': 'Recupero',
  'fatturato': 'Fatturato',
  '_finale': 'Definitiva'
};

async function init() {
  try {
    const res = await fetch('/api/jobs');
    allJobs = await res.json();
    const sel = document.getElementById('job-select');
    allJobs.forEach(j => {
      const o = document.createElement('option');
      o.value = j.id;
      o.textContent = (j.code || '') + ' — ' + (j.title || j.name);
      sel.appendChild(o);
    });

    const params = new URLSearchParams(location.search);
    const jobId = params.get('jobId');
    const revisionId = params.get('revisionId');
    const imageId = params.get('imageId');
    if (jobId) {
      sel.value = jobId;
      await onJobChange();
      if (revisionId) {
        const rev = filteredRevisions.find(r => r.id == revisionId);
        if (rev) openViewer(rev.id);
      } else if (imageId) {
        const rev = filteredRevisions.find(r => r.foglio_image_id == imageId);
        if (rev) openViewer(rev.id);
      }
    }
  } catch(e) { console.error(e); }
}

function resetViewerState() {
  closeViewer();
  currentRevision = null;
  currentComments = [];
  pendingPin = null;
  replyToId = null;
  pinMode = false;
  document.getElementById('btn-pin-mode').classList.remove('active');
}

async function onJobChange() {
  resetViewerState();
  currentJobId = document.getElementById('job-select').value;
  if (!currentJobId) {
    allRevisions = [];
    allImages = [];
    allColumns = [];
    filteredRevisions = [];
    renderGallery();
    return;
  }
  try {
    const [revRes, imgRes, colRes] = await Promise.all([
      fetch(`/api/foglio-revisions-batch/${currentJobId}`),
      fetch(`/api/foglio-images/${currentJobId}`),
      fetch(`/api/foglio-columns/${currentJobId}`)
    ]);
    allRevisions = revRes.ok ? await revRes.json() : [];
    allImages = imgRes.ok ? await imgRes.json() : [];
    allColumns = colRes.ok ? await colRes.json() : [];

    const phaseSel = document.getElementById('phase-select');
    const phases = new Set(allRevisions.map(r => r.phase_key));
    phaseSel.innerHTML = '<option value="">Tutte le fasi</option>';
    phases.forEach(p => {
      const o = document.createElement('option');
      o.value = p;
      o.textContent = PHASE_LABELS[p] || p;
      phaseSel.appendChild(o);
    });

    currentPhase = '';
    filterAndRender();
  } catch(e) { console.error(e); }
}

function onPhaseChange() {
  resetViewerState();
  currentPhase = document.getElementById('phase-select').value;
  filterAndRender();
}

function filterAndRender() {
  filteredRevisions = allRevisions.filter(r => r.file_type === 'image');
  if (currentPhase) filteredRevisions = filteredRevisions.filter(r => r.phase_key === currentPhase);
  filteredRevisions.sort((a, b) => {
    const imgA = allImages.find(i => i.id === a.foglio_image_id);
    const imgB = allImages.find(i => i.id === b.foglio_image_id);
    const nameA = imgA ? imgA.image_name : '';
    const nameB = imgB ? imgB.image_name : '';
    return nameA.localeCompare(nameB) || a.id - b.id;
  });
  renderGallery();
}

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const empty = document.getElementById('gallery-empty');
  const info = document.getElementById('toolbar-info');

  if (!currentJobId) {
    grid.style.display = 'none';
    empty.style.display = 'flex';
    info.textContent = '';
    return;
  }

  if (!filteredRevisions.length) {
    grid.style.display = 'none';
    empty.style.display = 'flex';
    empty.querySelector('h3').textContent = 'Nessuna revisione';
    empty.querySelector('p').textContent = 'Non ci sono immagini di revisione per questa selezione';
    info.textContent = '0 immagini';
    return;
  }

  empty.style.display = 'none';
  grid.style.display = 'grid';
  info.textContent = filteredRevisions.length + ' immagini';

  grid.innerHTML = filteredRevisions.map(rev => {
    const img = allImages.find(i => i.id === rev.foglio_image_id);
    const imageName = img ? img.image_name : '';
    const phaseLabel = PHASE_LABELS[rev.phase_key] || rev.phase_key;
    const isActive = currentRevision && currentRevision.id === rev.id;
    return `<div class="gallery-card${isActive ? ' active' : ''}" onclick="openViewer(${rev.id})" data-testid="gallery-card-${rev.id}">
      <img class="gallery-thumb" src="${esc(rev.file_url)}" alt="${esc(rev.title)}" loading="lazy">
      <div class="gallery-info">
        <div class="gallery-title" data-testid="gallery-title-${rev.id}">${esc(imageName || rev.title)}</div>
        <div class="gallery-meta">v${rev.version} · ${esc(rev.title)}</div>
        <span class="gallery-phase">${esc(phaseLabel)}</span>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function openViewer(revId) {
  const rev = filteredRevisions.find(r => r.id === revId);
  if (!rev) return;
  currentRevision = rev;

  const panel = document.getElementById('viewer-panel');
  panel.classList.add('open');

  const imgData = allImages.find(i => i.id === rev.foglio_image_id);
  document.getElementById('viewer-title').textContent = imgData ? imgData.image_name : rev.title;
  document.getElementById('viewer-meta').textContent = (PHASE_LABELS[rev.phase_key] || rev.phase_key) + ' · v' + rev.version;

  const canvas = document.getElementById('viewer-canvas');
  let wrap = canvas.querySelector('.canvas-wrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.className = 'canvas-wrap';
    wrap.id = 'canvas-wrap';
    canvas.appendChild(wrap);
  }
  let imgEl = wrap.querySelector('.canvas-image');
  if (!imgEl) {
    imgEl = document.createElement('img');
    imgEl.className = 'canvas-image';
    imgEl.id = 'review-image';
    imgEl.setAttribute('data-testid', 'review-image');
    imgEl.addEventListener('click', onCanvasClick);
    wrap.appendChild(imgEl);
  }
  imgEl.src = rev.file_url;
  updateCursor();

  wrap.querySelectorAll('.pin-marker').forEach(p => p.remove());

  imgEl.onload = () => {
    zoomFit();
    renderPins();
  };

  zoomLevel = 0;
  panX = 0; panY = 0;

  try {
    const commentsRes = await fetch('/api/revision-comments/' + rev.id);
    currentComments = commentsRes.ok ? await commentsRes.json() : [];
  } catch(e) { currentComments = []; }

  renderComments();
  renderGallery();
}

function closeViewer() {
  document.getElementById('viewer-panel').classList.remove('open');
  currentRevision = null;
  renderGallery();
}

function zoomFit() {
  const canvas = document.getElementById('viewer-canvas');
  const img = document.getElementById('review-image');
  if (!canvas || !img || !img.naturalWidth) return;
  const cw = canvas.clientWidth - 40;
  const ch = canvas.clientHeight - 40;
  zoomFitScale = Math.min(cw / img.naturalWidth, ch / img.naturalHeight, 1);
  zoomLevel = zoomFitScale;
  panX = 0; panY = 0;
  applyTransform();
  document.getElementById('zoom-level').textContent = 'Fit';
}

function zoomTo(level) {
  const img = document.getElementById('review-image');
  if (!img || !img.naturalWidth) return;
  zoomLevel = Math.max(0.1, Math.min(level, 8));
  applyTransform();
  const pct = Math.round(zoomLevel * 100);
  document.getElementById('zoom-level').textContent = pct + '%';
}

function applyTransform() {
  const canvas = document.getElementById('viewer-canvas');
  const wrap = document.getElementById('canvas-wrap');
  const img = document.getElementById('review-image');
  if (!wrap || !img || !img.naturalWidth) return;

  const iw = img.naturalWidth * zoomLevel;
  const ih = img.naturalHeight * zoomLevel;
  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;

  let tx = panX, ty = panY;
  if (iw <= cw) tx = (cw - iw) / 2;
  else tx = Math.min(0, Math.max(cw - iw, tx));
  if (ih <= ch) ty = (ch - ih) / 2;
  else ty = Math.min(0, Math.max(ch - ih, ty));
  panX = tx; panY = ty;

  wrap.style.transform = `translate(${tx}px,${ty}px) scale(${zoomLevel})`;
  wrap.style.width = img.naturalWidth + 'px';
  wrap.style.height = img.naturalHeight + 'px';
}

function updateCursor() {
  const canvas = document.getElementById('viewer-canvas');
  const img = document.getElementById('review-image');
  if (pinMode) {
    canvas.style.cursor = 'crosshair';
    if (img) img.style.cursor = 'crosshair';
  } else {
    const isZoomed = img && img.naturalWidth && (img.naturalWidth * zoomLevel > canvas.clientWidth || img.naturalHeight * zoomLevel > canvas.clientHeight);
    canvas.style.cursor = isZoomed ? 'grab' : 'default';
    if (img) img.style.cursor = isZoomed ? 'grab' : 'default';
  }
}

(function setupCanvasEvents() {
  const canvas = document.getElementById('viewer-canvas');

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const img = document.getElementById('review-image');
    if (!img || !img.naturalWidth) return;
    const delta = e.deltaY > 0 ? -0.15 : 0.15;
    const oldZ = zoomLevel;
    const newZ = Math.max(0.1, Math.min(zoomLevel + delta * zoomLevel, 8));

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    panX = mx - (mx - panX) * (newZ / oldZ);
    panY = my - (my - panY) * (newZ / oldZ);
    zoomLevel = newZ;
    applyTransform();
    updateCursor();
    document.getElementById('zoom-level').textContent = Math.round(zoomLevel * 100) + '%';
  }, { passive: false });

  canvas.addEventListener('mousedown', (e) => {
    if (pinMode) return;
    if (e.target.closest('.nav-arrow') || e.target.closest('.zoom-controls') || e.target.closest('.pin-marker')) return;
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY, px: panX, py: panY };
    canvas.classList.add('grabbing');
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    panX = panStart.px + (e.clientX - panStart.x);
    panY = panStart.py + (e.clientY - panStart.y);
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    if (isPanning) {
      isPanning = false;
      document.getElementById('viewer-canvas').classList.remove('grabbing');
    }
  });

  canvas.addEventListener('dblclick', (e) => {
    if (e.target.closest('.nav-arrow') || e.target.closest('.zoom-controls') || e.target.closest('.pin-marker')) return;
    if (pinMode) return;
    const img = document.getElementById('review-image');
    if (!img) return;
    if (Math.abs(zoomLevel - zoomFitScale) < 0.05) {
      zoomTo(1);
    } else {
      zoomFit();
    }
  });
})();

function navImage(dir) {
  if (!currentRevision) return;
  const idx = filteredRevisions.findIndex(r => r.id === currentRevision.id);
  if (idx < 0) return;
  const next = idx + dir;
  if (next >= 0 && next < filteredRevisions.length) {
    openViewer(filteredRevisions[next].id);
  }
}

document.addEventListener('keydown', (e) => {
  if (!currentRevision) return;
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft') navImage(-1);
  if (e.key === 'ArrowRight') navImage(1);
  if (e.key === 'Escape') closeViewer();
  if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomTo(zoomLevel + 0.25); }
  if (e.key === '-') { e.preventDefault(); zoomTo(zoomLevel - 0.25); }
  if (e.key === '0') { e.preventDefault(); zoomFit(); }
});

function togglePinMode() {
  pinMode = !pinMode;
  document.getElementById('btn-pin-mode').classList.toggle('active', pinMode);
  updateCursor();
  document.getElementById('pin-hint').textContent = pinMode ? "Clicca sull'immagine per posizionare un pin" : '';
}

function onCanvasClick(e) {
  if (!pinMode) return;
  if (isPanning) return;
  const img = document.getElementById('review-image');
  if (!img) return;
  const rect = img.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(2);
  const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(2);
  pendingPin = { x: parseFloat(x), y: parseFloat(y) };
  document.getElementById('pin-hint').textContent = 'Pin a (' + x + '%, ' + y + '%). Scrivi il commento.';
  document.getElementById('comment-input').focus();
  document.getElementById('btn-submit-comment').disabled = false;
}

function renderPins() {
  const wrap = document.getElementById('canvas-wrap');
  if (!wrap) return;
  wrap.querySelectorAll('.pin-marker').forEach(p => p.remove());
  const img = document.getElementById('review-image');
  if (!img || !img.naturalWidth) return;

  let pinNum = 0;
  currentComments.filter(c => c.pin_x != null && c.pin_y != null && !c.parent_comment_id).forEach(c => {
    pinNum++;
    const pin = document.createElement('div');
    pin.className = 'pin-marker' + (c.resolved ? ' resolved' : '');
    pin.setAttribute('data-testid', 'pin-' + c.id);
    pin.textContent = pinNum;
    pin.style.left = c.pin_x + '%';
    pin.style.top = c.pin_y + '%';
    pin.onclick = (ev) => { ev.stopPropagation(); highlightComment(c.id); };
    wrap.appendChild(pin);
  });
}

function renderComments() {
  const list = document.getElementById('comments-list');
  const topLevel = currentComments.filter(c => !c.parent_comment_id);
  document.getElementById('comment-count').textContent = topLevel.length;

  if (!currentComments.length) {
    list.innerHTML = '<div style="padding:16px;text-align:center;color:#666;font-size:.7rem">Nessun commento. Clicca sull\'immagine per aggiungere un pin.</div>';
    return;
  }

  let pinNum = 0;
  list.innerHTML = topLevel.map(c => {
    const hasPin = c.pin_x != null && c.pin_y != null;
    if (hasPin) pinNum++;
    const replies = currentComments.filter(r => r.parent_comment_id === c.id);
    const tag = parseTag(c.content);
    return `<div class="comment-item${c.resolved ? ' resolved-comment' : ''}" id="comment-${c.id}" data-testid="comment-${c.id}">
      <div class="comment-head">
        ${hasPin ? '<div class="comment-pin-num' + (c.resolved ? ' resolved' : '') + '">' + pinNum + '</div>' : ''}
        <span class="comment-author">${esc(c.author_name)}</span>
        <span class="comment-time">${formatTime(c.created_at)}</span>
      </div>
      <div class="comment-body">${tag.html}${esc(tag.text)}</div>
      <div class="comment-actions">
        <button class="comment-action-btn" data-testid="btn-resolve-${c.id}" onclick="resolveComment(${c.id},${!c.resolved})">${c.resolved ? 'Riapri' : 'Risolvi'}</button>
        <button class="comment-action-btn" data-testid="btn-reply-${c.id}" onclick="startReply(${c.id})">Rispondi</button>
        <button class="comment-action-btn" data-testid="btn-delete-comment-${c.id}" onclick="deleteComment(${c.id})">Elimina</button>
      </div>
      ${replies.map(r => {
        const rt = parseTag(r.content);
        return `<div style="margin:6px 0 0 24px;padding:6px 8px;border-radius:6px;background:rgba(255,255,255,.02);border:1px solid #222">
          <div class="comment-head"><span class="comment-author">${esc(r.author_name)}</span><span class="comment-time">${formatTime(r.created_at)}</span></div>
          <div class="comment-body">${rt.html}${esc(rt.text)}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function parseTag(content) {
  if (!content) return { html: '', text: '' };
  const match = content.match(/^\[(\w+)\]\s*/);
  if (match && TAG_LABELS[match[1]]) {
    return {
      html: '<span class="comment-tag tag-' + match[1] + '">' + TAG_LABELS[match[1]] + '</span> ',
      text: content.slice(match[0].length)
    };
  }
  return { html: '', text: content };
}

function formatTime(t) {
  if (!t) return '';
  const d = new Date(t);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Ora';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm fa';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h fa';
  return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
}

function highlightComment(id) {
  document.querySelectorAll('.comment-item').forEach(c => c.classList.remove('highlighted'));
  const el = document.getElementById('comment-' + id);
  if (el) { el.classList.add('highlighted'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  document.querySelectorAll('.pin-marker').forEach(p => p.classList.remove('active-pin'));
  const pin = document.querySelector('[data-testid="pin-' + id + '"]');
  if (pin) pin.classList.add('active-pin');
}

function startReply(id) {
  replyToId = id;
  const c = currentComments.find(cc => cc.id === id);
  document.getElementById('pin-hint').textContent = 'Rispondendo a ' + esc(c?.author_name || '') + '...';
  document.getElementById('comment-input').focus();
  document.getElementById('btn-submit-comment').disabled = false;
}

async function submitComment() {
  const rawContent = document.getElementById('comment-input').value.trim();
  if (!rawContent || !currentRevision) return;
  const authorName = document.getElementById('comment-author').value;
  const tag = document.getElementById('comment-tag').value;
  const content = tag ? '[' + tag + '] ' + rawContent : rawContent;
  try {
    const body = {
      author_name: authorName,
      content,
      pin_x: pendingPin ? pendingPin.x : null,
      pin_y: pendingPin ? pendingPin.y : null,
      parent_comment_id: replyToId || null
    };
    const res = await fetch('/api/revision-comments/' + currentRevision.id, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('Errore');
    document.getElementById('comment-input').value = '';
    pendingPin = null;
    replyToId = null;
    document.getElementById('pin-hint').textContent = '';
    document.getElementById('btn-submit-comment').disabled = true;
    document.getElementById('comment-tag').value = '';
    const comments = await fetch('/api/revision-comments/' + currentRevision.id).then(r => r.json());
    currentComments = comments;
    renderComments();
    renderPins();
  } catch(e) { console.error(e); }
}

async function resolveComment(id, resolved) {
  try {
    await fetch('/api/revision-comments/' + id + '/resolve', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ resolved }) });
    const comments = await fetch('/api/revision-comments/' + currentRevision.id).then(r => r.json());
    currentComments = comments;
    renderComments();
    renderPins();
  } catch(e) { console.error(e); }
}

async function deleteComment(id) {
  if (!confirm('Eliminare questo commento?')) return;
  try {
    await fetch('/api/revision-comments/' + id, { method: 'DELETE' });
    const comments = await fetch('/api/revision-comments/' + currentRevision.id).then(r => r.json());
    currentComments = comments;
    renderComments();
    renderPins();
  } catch(e) { console.error(e); }
}

document.getElementById('comment-input').addEventListener('input', function() {
  document.getElementById('btn-submit-comment').disabled = !this.value.trim();
});

init();
</script>
</body>
</html>
