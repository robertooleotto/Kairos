<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Kairos — Login</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#0f0f17;--paper-h:#16161f;--paper-l:#24242d;
  --paper-s:#cdd0de;--paper-m:#737889;--paper-t:#f9fafb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Sora',sans-serif;
  background:var(--paper);
  color:var(--paper-t);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-container{
  background:var(--paper-h);
  border-radius:16px;
  padding:48px 40px;
  width:100%;
  max-width:420px;
  border:1px solid var(--paper-l);
  text-align:center;
}
.logo{ margin-bottom:36px; }
.logo-icon{ font-size:3rem; margin-bottom:12px; }
.brand-name{
  font-family:'Fraunces',serif;
  font-size:1.8rem;
  font-weight:700;
  margin-bottom:4px;
}
.brand-sub{
  font-size:.8rem;
  color:var(--paper-m);
}
.divider{
  height:1px;
  background:var(--paper-l);
  margin:24px 0;
}
.form-group{
  text-align:left;
  margin-bottom:16px;
}
.form-group label{
  display:block;
  font-size:.8rem;
  color:var(--paper-m);
  margin-bottom:6px;
}
.form-group input{
  width:100%;
  padding:12px 14px;
  border-radius:8px;
  background:var(--paper-l);
  border:1px solid #333;
  color:var(--paper-t);
  font-family:'Sora',sans-serif;
  font-size:.9rem;
  outline:none;
  transition:border .2s;
}
.form-group input:focus{
  border-color:#6366f1;
}
.btn-login{
  width:100%;
  padding:14px 24px;
  border-radius:10px;
  background:#6366f1;
  color:#fff;
  border:none;
  font-family:'Sora',sans-serif;
  font-size:.9rem;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
  margin-top:8px;
}
.btn-login:hover{
  background:#5254cc;
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(99,102,241,.4);
}
.btn-login:disabled{
  opacity:.6;
  cursor:not-allowed;
  transform:none;
}
.error-msg{
  color:#f87171;
  font-size:.8rem;
  margin-top:12px;
  display:none;
}
.info-text{
  font-size:.72rem;
  color:var(--paper-m);
  margin-top:20px;
  line-height:1.5;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <div class="brand-name">Kairos</div>
    <div class="brand-sub">Project Management — NuDesign</div>
  </div>

  <form id="loginForm">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">Accedi</button>
    <div class="error-msg" id="errorMsg">Credenziali non valide</div>
  </form>

  <div class="info-text">
    Accesso riservato al team NuDesign
  </div>
</div>

<script>
// Se già loggato, vai alla dashboard
(async function(){
  try {
    const res = await fetch('/api/auth/user', { credentials: 'include' });
    if(res.ok){
      const user = await res.json();
      if(user && user.id) window.location.href = '/dashboard.html';
    }
  } catch(e) {}
})();

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errMsg = document.getElementById('errorMsg');
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Accesso in corso…';
  errMsg.style.display = 'none';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username, password })
    });
    if (res.ok) {
      window.location.href = '/dashboard.html';
    } else {
      const data = await res.json().catch(() => ({}));
      errMsg.textContent = data.message || 'Credenziali non valide';
      errMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Accedi';
    }
  } catch(err) {
    errMsg.textContent = 'Errore di rete. Riprova.';
    errMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
});
</script>
</body>
</html>
