<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Database Schema — Planning Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#0f0f17;--paper-h:#16161f;--paper-l:#24242d;
  --paper-s:#cdd0de;--paper-m:#737889;--paper-t:#f9fafb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Sora,sans-serif;background:var(--paper);color:var(--paper-t);min-height:100vh}

.header{padding:16px 24px;border-bottom:1px solid var(--paper-l);display:flex;align-items:center;gap:16px;}
.brand-name{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700}
.brand-sub{font-size:.68rem;color:var(--paper-m);margin-top:2px}
.nav-buttons{display:flex;gap:12px;margin-left:auto}
.nav-btn{padding:5px 14px;border-radius:8px;font-size:.74rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:#626882;font-family:'Sora',sans-serif;}
.nav-btn.active{background:rgba(99,102,241,.12);color:#a5b4fc}

.container{padding:24px;max-width:1600px;margin:0 auto}
.section-title{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;margin-bottom:8px}
.section-sub{font-size:0.8rem;color:var(--paper-m);margin-bottom:32px;}

.tables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:24px;}

.table-card{background:var(--paper-h);border-radius:12px;border:1px solid var(--paper-l);overflow:hidden;}
.table-header{padding:16px 20px;background:rgba(99,102,241,0.08);border-bottom:1px solid var(--paper-l);display:flex;align-items:center;gap:10px;}
.table-icon{font-size:1.1rem;}
.table-name{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;color:#a5b4fc;}
.table-count{margin-left:auto;font-size:0.7rem;color:var(--paper-m);background:var(--paper-l);padding:2px 8px;border-radius:10px;}

.schema-table{width:100%;border-collapse:collapse;}
.schema-table th{
  padding:8px 12px;background:rgba(0,0,0,0.3);
  text-align:left;font-size:0.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.08em;color:var(--paper-m);
  border-bottom:1px solid var(--paper-l);
}
.schema-table td{
  padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:0.78rem;vertical-align:middle;
}
.schema-table tr:last-child td{border-bottom:none;}
.schema-table tr:hover td{background:rgba(99,102,241,0.04);}

.col-name{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--paper-t);}
.col-pk{color:#f59e0b;}
.col-fk{color:#60a5fa;}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:0.65rem;font-weight:600;}
.tag-pk{background:rgba(245,158,11,0.15);color:#f59e0b;}
.tag-fk{background:rgba(96,165,250,0.15);color:#60a5fa;}
.tag-type{background:rgba(255,255,255,0.06);color:var(--paper-m);font-family:'JetBrains Mono',monospace;}
.tag-nn{background:rgba(239,68,68,0.12);color:#f87171;}
.tag-def{background:rgba(34,197,94,0.12);color:#4ade80;}

.stats-bar{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.stat-card{background:var(--paper-h);border:1px solid var(--paper-l);border-radius:10px;padding:14px 20px;display:flex;flex-direction:column;gap:4px;min-width:120px;}
.stat-value{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:#a5b4fc;}
.stat-label{font-size:0.7rem;color:var(--paper-m);text-transform:uppercase;font-weight:600;}

.loading{text-align:center;padding:60px;color:var(--paper-m);}
</style>
</head>
<body>

<div class="header">
  <div class="brand"><div class="brand-name">Database</div><div class="brand-sub">Planning Studio</div></div>
  <div class="nav-buttons">
    <button class="nav-btn" onclick="location.href='preview.html'">Calendario</button>
    <button class="nav-btn" onclick="location.href='commesse.html'">Commesse</button>
    <button class="nav-btn" onclick="location.href='team.html'">Team</button>
    <button class="nav-btn" onclick="location.href='clienti.html'">Clienti</button>
    <button class="nav-btn" onclick="location.href='gantt.html'">Gantt</button>
    <button class="nav-btn" onclick="location.href='review.html'">Review</button>
    <button class="nav-btn active">Database</button>
  </div>
</div>

<div class="container">
  <div class="section-title">Struttura del Database</div>
  <div class="section-sub">Schema completo delle tabelle — PostgreSQL su Replit</div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-card"><div class="stat-value" id="stat-tables">—</div><div class="stat-label">Tabelle</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-cols">—</div><div class="stat-label">Colonne totali</div></div>
  </div>

  <div id="tables-grid" class="tables-grid">
    <div class="loading">Caricamento schema...</div>
  </div>
</div>

<script>
const TYPE_COLORS = {
  uuid: '#8b5cf6', text: '#60a5fa', integer: '#10b981', serial: '#f59e0b',
  boolean: '#ec4899', 'timestamp with time zone': '#f97316', date: '#f97316',
  numeric: '#a78bfa', 'character varying': '#60a5fa',
  'json': '#34d399', 'jsonb': '#34d399'
};

function shortType(t, def) {
  if (!t) return '';
  if (t === 'integer' && def && def.includes('nextval')) return 'serial';
  if (t === 'uuid') return 'uuid';
  if (t === 'boolean') return 'bool';
  if (t === 'text') return 'text';
  if (t === 'date') return 'date';
  if (t === 'numeric') return 'numeric';
  if (t.includes('timestamp')) return 'timestamptz';
  if (t.includes('character varying')) return 'varchar';
  return t;
}

function isPk(colName, tableName) {
  if (colName === 'id') return true;
  return false;
}

function isFk(colName) {
  return colName.endsWith('_id') && colName !== 'id';
}

const TABLE_ICONS = {
  areas: '📁', departments: '🏢', task_types: '⚙️',
  collaborators: '👤', person_capacities: '📊',
  clients: '🏬', jobs: '📋', job_phases: '🔖'
};

async function loadSchema() {
  try {
    const tables = await fetch('/api/schema').then(r => r.json());
    
    let totalCols = 0;
    tables.forEach(t => totalCols += (t.columns || []).length);
    
    document.getElementById('stat-tables').textContent = tables.length;
    document.getElementById('stat-cols').textContent = totalCols;
    
    const grid = document.getElementById('tables-grid');
    grid.innerHTML = tables.map(t => {
      const cols = t.columns || [];
      return `
        <div class="table-card">
          <div class="table-header">
            <span class="table-icon">${TABLE_ICONS[t.table_name] || '📄'}</span>
            <span class="table-name">${t.table_name}</span>
            <span class="table-count">${cols.length} colonne</span>
          </div>
          <table class="schema-table">
            <thead>
              <tr>
                <th>Colonna</th>
                <th>Tipo</th>
                <th>Vincoli</th>
                <th>Default</th>
              </tr>
            </thead>
            <tbody>
              ${cols.map(c => {
                const pk = isPk(c.column_name, t.table_name);
                const fk = isFk(c.column_name);
                const shortT = shortType(c.data_type, c.column_default);
                const color = TYPE_COLORS[c.data_type] || '#9ca3af';
                return `<tr>
                  <td>
                    <span class="col-name ${pk ? 'col-pk' : fk ? 'col-fk' : ''}">${c.column_name}</span>
                  </td>
                  <td><span class="tag tag-type" style="color:${color}">${shortT}</span></td>
                  <td>
                    ${pk ? '<span class="tag tag-pk">PK</span> ' : ''}
                    ${fk ? '<span class="tag tag-fk">FK</span> ' : ''}
                    ${c.is_nullable === 'NO' && !pk ? '<span class="tag tag-nn">NOT NULL</span>' : ''}
                  </td>
                  <td style="font-size:0.7rem;color:var(--paper-m);font-family:monospace;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${c.column_default || ''}">
                    ${c.column_default ? '<span class="tag tag-def">' + (c.column_default.length > 20 ? c.column_default.substring(0,20)+'…' : c.column_default) + '</span>' : '—'}
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }).join('');
  } catch(e) {
    document.getElementById('tables-grid').innerHTML = `<div class="loading">Errore nel caricamento: ${e.message}</div>`;
  }
}

loadSchema();
</script>
</body>
</html>
