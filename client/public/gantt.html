<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Planning Studio — Gantt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
<link href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css" rel="stylesheet">
<script src="api-client.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --nav-bg:#0f1019;
  --nav-surface:#161825;
  --nav-elevated:#1c1f30;
  --nav-border:#262a3e;
  --nav-text:#e8ebf6;
  --nav-muted:#5c6180;
  --nav-secondary:#8b90a8;

  --g-bg:#ffffff;
  --g-surface:#f8f9fb;
  --g-border:#e8eaef;
  --g-border-subtle:#f0f1f5;
  --g-text:#1a1d2e;
  --g-text-secondary:#6b7194;
  --g-text-muted:#9ca0b8;
  --g-hover:rgba(99,102,241,.06);
  --g-selected:rgba(99,102,241,.1);
  --g-weekend:#fafbfc;

  --accent:#4f46e5;
  --accent-soft:rgba(79,70,229,.1);
  --today-red:#e74c3c;
}

html,body{font-family:'Sora',system-ui,sans-serif;background:var(--g-bg);color:var(--g-text);font-size:14px;-webkit-font-smoothing:antialiased;height:100%;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f4f5f7}
::-webkit-scrollbar-thumb{background:#ccd0dc;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#b0b5c5}

#toolbar{display:flex;align-items:center;gap:10px;padding:0 28px;height:54px;background:var(--nav-surface);border-bottom:1px solid var(--nav-border);position:sticky;top:0;z-index:600}
.brand{display:flex;align-items:center;gap:11px}
.nav-buttons{display:flex;gap:2px;position:absolute;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.04);border-radius:10px;padding:3px}
.nav-btn{padding:5px 16px;border-radius:8px;font-size:.74rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--nav-muted);font-family:'Sora',sans-serif;transition:all .18s}
.nav-btn.active{background:var(--nav-elevated);color:var(--nav-text)}
.nav-btn:hover:not(.active){color:var(--nav-secondary);background:rgba(255,255,255,.04)}

#gantt-toolbar{display:flex;align-items:center;gap:14px;padding:8px 20px;background:var(--g-surface);border-bottom:1px solid var(--g-border)}

.toolbar-search{position:relative;flex:0 0 200px}
.toolbar-search input{width:100%;background:#fff;border:1px solid var(--g-border);border-radius:8px;padding:6px 10px 6px 32px;color:var(--g-text);font-family:'Sora',sans-serif;font-size:.75rem;outline:none;transition:border-color .15s}
.toolbar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.toolbar-search input::placeholder{color:var(--g-text-muted)}
.toolbar-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--g-text-muted);width:15px;height:15px}

.toolbar-divider{width:1px;height:26px;background:var(--g-border);flex-shrink:0}

.filter-group{display:flex;align-items:center;gap:8px}
.filter-chip{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--g-border);border-radius:8px;padding:5px 10px;cursor:pointer;transition:all .15s}
.filter-chip:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.filter-chip svg{width:14px;height:14px;color:var(--g-text-muted)}
.filter-chip select{background:transparent;border:none;color:var(--g-text);font-family:'Sora',sans-serif;font-size:.72rem;font-weight:500;outline:none;cursor:pointer;-webkit-appearance:none;padding-right:2px}
.filter-chip select option{background:#fff;color:var(--g-text)}

.toolbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.scale-group{display:flex;background:#fff;border:1px solid var(--g-border);border-radius:8px;overflow:hidden}
.scale-btn{padding:5px 13px;font-size:.68rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--g-text-muted);font-family:'Sora',sans-serif;transition:all .15s;border-right:1px solid var(--g-border)}
.scale-btn:last-child{border-right:none}
.scale-btn.active{background:var(--accent);color:#fff}
.scale-btn:hover:not(.active){color:var(--g-text);background:var(--g-surface)}

.today-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--g-border);background:#fff;color:var(--g-text-secondary);font-family:'Sora',sans-serif;transition:all .15s}
.today-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.today-btn svg{width:14px;height:14px}

.expand-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--g-border);background:#fff;color:var(--g-text-secondary);font-family:'Sora',sans-serif;transition:all .15s}
.expand-btn:hover{border-color:var(--accent);color:var(--accent)}
.expand-btn svg{width:14px;height:14px}

.counter-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:10px;background:var(--accent-soft);color:var(--accent);font-size:.65rem;font-weight:700;padding:0 6px;margin-left:4px}

#gantt_here{width:100%;height:calc(100vh - 54px - 46px)}

.gantt_container{border:none!important;background:var(--g-bg)!important;font-family:'Sora',sans-serif!important}

.gantt_grid{background:var(--g-bg)!important;border-right:1px solid var(--g-border)!important}
.gantt_grid_scale{background:var(--g-surface)!important;border-bottom:1px solid var(--g-border)!important}
.gantt_grid_scale .gantt_grid_head_cell{color:var(--g-text-muted)!important;border-right:none!important;font-family:'Sora',sans-serif!important;font-size:10px!important;font-weight:600!important;text-transform:uppercase!important;letter-spacing:.06em!important}
.gantt_grid_data .gantt_row{background:var(--g-bg)!important;border-bottom:1px solid var(--g-border-subtle)!important}
.gantt_grid_data .gantt_row.odd{background:var(--g-bg)!important}
.gantt_grid_data .gantt_cell{color:var(--g-text)!important;border-right:none!important;font-size:12px!important}
.gantt_tree_content{font-family:'Sora',sans-serif!important;font-size:12.5px!important;font-weight:400!important;color:var(--g-text)!important}

.gantt_task_scale{background:var(--g-surface)!important;border-bottom:1px solid var(--g-border)!important}
.gantt_scale_cell{background:var(--g-surface)!important;color:var(--g-text-muted)!important;border-right:1px solid var(--g-border-subtle)!important;border-bottom:none!important;font-family:'Sora',sans-serif!important;font-size:10px!important;font-weight:600!important;letter-spacing:.02em!important}
.gantt_task_bg{background:var(--g-bg)!important}
.gantt_task_row{border-bottom:1px solid var(--g-border-subtle)!important;background:var(--g-bg)!important}
.gantt_task_row.odd{background:var(--g-bg)!important}
.gantt_task_cell{border-right:1px solid var(--g-border-subtle)!important}

.gantt_row.gantt_selected,.gantt_task_row.gantt_selected{background:var(--g-selected)!important}
.gantt_grid_data .gantt_row:hover,.gantt_task_row:hover{background:var(--g-hover)!important}

.gantt_tree_icon.gantt_open,.gantt_tree_icon.gantt_close{opacity:.5}
.gantt_tree_icon.gantt_open:hover,.gantt_tree_icon.gantt_close:hover{opacity:.8}

.gantt_task_line{border-radius:6px!important;border:none!important;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:box-shadow .15s,transform .15s}
.gantt_task_line:hover{box-shadow:0 3px 10px rgba(0,0,0,.18);transform:translateY(-1px)}
.gantt_task_content{font-family:'Sora',sans-serif!important;font-size:11px!important;font-weight:600!important;color:#fff!important;padding:0 8px!important;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.gantt_task_progress{border-radius:6px!important;background:rgba(0,0,0,.15)!important}
.gantt_task_progress_wrapper{border-radius:6px!important}

.gantt_row_project .gantt_tree_content{font-weight:700!important;color:var(--g-text)!important;font-size:13px!important}
.gantt_task_line.gantt_project{background:transparent!important;border:2px solid var(--g-text-muted)!important;border-radius:4px!important;box-shadow:none!important;height:14px!important;margin-top:13px!important}
.gantt_task_line.gantt_project .gantt_task_content{display:none!important}
.gantt_task_line.gantt_project .gantt_task_progress_wrapper{display:none!important}

.gantt_link_line_right,.gantt_link_line_left,.gantt_link_line_up,.gantt_link_line_down{border-color:rgba(79,70,229,.3)!important}
.gantt_link_arrow_right,.gantt_link_arrow_left{border-left-color:rgba(79,70,229,.3)!important;border-right-color:rgba(79,70,229,.3)!important}

.gantt_hor_scroll,.gantt_ver_scroll{background:var(--g-surface)!important;border:none!important}
div.gantt_ver_scroll>div,div.gantt_hor_scroll>div{background:#ccd0dc!important;border-radius:3px}

.weekend{background:var(--g-weekend)!important}

.gantt_marker{background:var(--today-red)!important;width:2px!important;opacity:1;z-index:5}
.gantt_marker .gantt_marker_content{background:var(--today-red)!important;color:#fff!important;font-family:'Sora',sans-serif!important;font-size:9px!important;font-weight:700!important;padding:2px 6px!important;border-radius:0 0 4px 4px!important;box-shadow:0 2px 6px rgba(231,76,60,.3)}

.gantt_tooltip{background:#fff!important;border:1px solid var(--g-border)!important;border-radius:10px!important;box-shadow:0 8px 30px rgba(0,0,0,.12)!important;padding:12px 16px!important;color:var(--g-text)!important;font-family:'Sora',sans-serif!important;font-size:12px!important;max-width:320px}
.tt-title{font-weight:700;font-size:13px;margin-bottom:6px;line-height:1.3;color:var(--g-text)}
.tt-row{display:flex;align-items:center;gap:6px;margin:3px 0;color:var(--g-text-secondary);font-size:11px}
.tt-row svg{width:13px;height:13px;flex-shrink:0}
.tt-row strong{color:var(--g-text);font-weight:600}
.tt-progress{margin-top:6px;height:4px;background:#e8eaef;border-radius:2px;overflow:hidden}
.tt-progress-bar{height:100%;border-radius:2px;transition:width .3s}

.cell-assignee{display:flex;align-items:center;gap:6px}
.cell-avatar{width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;border:1px solid var(--g-border)}
.cell-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.cell-name{font-size:11px;color:var(--g-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.cell-status{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.02em}
.status-nuova{background:#eef2ff;color:#4f46e5}
.status-in_corso{background:#ecfdf5;color:#059669}
.status-in_pausa{background:#fffbeb;color:#d97706}
.status-completata{background:#ecfdf5;color:#059669}
.status-annullata{background:#fef2f2;color:#dc2626}
.status-preventivo{background:#f5f3ff;color:#7c3aed}

.gantt_grid_data .gantt_row{height:40px!important;line-height:40px!important}
.gantt_task_row{height:40px!important}
.gantt_task_line{height:24px!important;margin-top:8px}
.gantt_grid_scale,.gantt_task_scale{line-height:38px!important}

.gantt_row.gantt_row_project{border-left:3px solid var(--accent)!important}

.gantt_task_drag{cursor:ew-resize}
.gantt_task_line .gantt_task_drag{background:transparent!important}
</style>
</head>
<body>

<div id="toolbar">
  <div class="brand">
    <img src="nudesign-logo.png" alt="NuDesign" style="height:56px;object-fit:contain">
  </div>
  <div class="nav-buttons">
    <button class="nav-btn" data-testid="nav-calendario" onclick="location.href='preview.html'">Calendario</button>
    <button class="nav-btn" data-testid="nav-stato" onclick="location.href='status.html'">Stato</button>
    <button class="nav-btn" data-testid="nav-report" onclick="location.href='report.html'">Report</button>
    <button class="nav-btn" data-testid="nav-team" onclick="location.href='team.html'">Team</button>
    <button class="nav-btn" data-testid="nav-commesse" onclick="location.href='commesse.html'">Commesse</button>
    <button class="nav-btn" data-testid="nav-clienti" onclick="location.href='clienti.html'">Clienti</button>
    <button class="nav-btn active" data-testid="nav-gantt" onclick="location.href='gantt.html'">Gantt</button>
  </div>
</div>

<div id="gantt-toolbar">
  <div class="toolbar-search">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" data-testid="input-search" placeholder="Cerca commessa o fase..." oninput="applyFilters()">
  </div>

  <div class="toolbar-divider"></div>

  <div class="filter-group">
    <div class="filter-chip">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <select id="filter-client" data-testid="select-filter-client" onchange="applyFilters()">
        <option value="">Tutti i clienti</option>
      </select>
    </div>
    <div class="filter-chip">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <select id="filter-status" data-testid="select-filter-status" onchange="applyFilters()">
        <option value="">Tutti gli stati</option>
        <option value="preventivo">Preventivo</option>
        <option value="nuova">Nuova</option>
        <option value="in_corso">In corso</option>
        <option value="in_pausa">In pausa</option>
        <option value="completata">Completata</option>
        <option value="annullata">Annullata</option>
      </select>
    </div>
    <span id="job-count" class="counter-badge" data-testid="text-job-count">0</span>
  </div>

  <div class="toolbar-right">
    <button class="expand-btn" data-testid="btn-expand-all" onclick="toggleExpandAll()" title="Espandi/Comprimi tutto">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      <span id="expand-label">Comprimi</span>
    </button>

    <button class="today-btn" data-testid="btn-today" onclick="goToToday()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Oggi
    </button>

    <div class="toolbar-divider"></div>

    <div class="scale-group">
      <button class="scale-btn" data-testid="btn-scale-day" onclick="setScale('day')">Giorno</button>
      <button class="scale-btn active" data-testid="btn-scale-week" onclick="setScale('week')">Settimana</button>
      <button class="scale-btn" data-testid="btn-scale-month" onclick="setScale('month')">Mese</button>
      <button class="scale-btn" data-testid="btn-scale-quarter" onclick="setScale('quarter')">Trimestre</button>
    </div>
  </div>
</div>

<div id="gantt_here" data-testid="gantt-container"></div>

<script>
const WRIKE_COLORS=[
  '#4ecdc4','#2ecc71','#a78bfa','#60a5fa','#fbbf24',
  '#f472b6','#f97316','#ef4444','#14b8a6','#8b5cf6',
  '#3b82f6','#ec4899'
];

const DEPT_COLORS={
  'ART DIRECTION':'#a78bfa',
  'CONCEPT':'#f472b6',
  'GRAFICA':'#fbbf24',
  'MODELLAZIONE':'#2ecc71',
  'SET DESIGN':'#4ecdc4',
  'PRODUZIONE 3D':'#60a5fa',
  'PRODUZIONE AI':'#8b5cf6',
  'SHOOTING':'#ef4444',
  'POST-PRODUZIONE':'#3b82f6'
};

const STATUS_LABELS={
  'nuova':'Nuova','in_corso':'In corso','in_pausa':'In pausa',
  'completata':'Completata','annullata':'Annullata','preventivo':'Preventivo'
};

let ALL_JOBS=[];
let ALL_PHASES_RAW=[];
let ALL_COLLABORATORS={};
let currentScale='week';
let allExpanded=true;
let ganttInitialized=false;

function configGantt(){
  gantt.config.date_format="%Y-%m-%d";
  gantt.config.drag_move=true;
  gantt.config.drag_resize=true;
  gantt.config.drag_progress=true;
  gantt.config.drag_links=false;
  gantt.config.show_progress=true;
  gantt.config.fit_tasks=true;
  gantt.config.auto_scheduling=false;
  gantt.config.row_height=40;
  gantt.config.bar_height=24;
  gantt.config.scale_height=56;
  gantt.config.min_column_width=40;
  gantt.config.open_tree_initially=true;
  gantt.config.scroll_size=6;
  gantt.config.show_links=false;
  gantt.config.readonly=false;
  gantt.config.smart_rendering=true;
  gantt.config.show_markers=true;

  gantt.config.columns=[
    {name:"text",label:"Title",tree:true,width:280,resize:true,
      template:function(t){
        if(t.type===gantt.config.types.project){
          const code=t.job_code||'';
          const title=t.job_title||'';
          const client=t.client_name||'';
          let html='<div style="display:flex;flex-direction:column;line-height:1.25;padding:2px 0">';
          html+='<span style="font-weight:700;font-size:12.5px;color:#1a1d2e">'+(client?'<span style="color:#4f46e5;font-weight:600">'+escHtml(client)+'</span> · ':'')+escHtml(code)+'</span>';
          if(title) html+='<span style="font-size:10px;color:#6b7194;margin-top:1px">'+escHtml(title)+'</span>';
          html+='</div>';
          return html;
        }
        return '<span style="color:#1a1d2e">'+escHtml(t.text)+'</span>';
      }
    },
    {name:"start_date",label:"Start date",align:"center",width:80,resize:true},
    {name:"end_date",label:"Due date",align:"center",width:80,resize:true},
    {name:"assigned",label:"Assignee",align:"center",width:130,resize:true,
      template:function(t){
        if(!t.assigned)return '';
        const initials=t.assigned.split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2);
        const avatarSrc=safeUrl(t.avatar_url);
        const bgColor=t.avatar_color||'#4f46e5';
        const avatar=avatarSrc
          ?'<img src="'+avatarSrc+'" alt="">'
          :initials;
        const avatarStyle=avatarSrc?'':'background:'+safeColor(bgColor)+';color:#fff;';
        return '<div class="cell-assignee"><div class="cell-avatar" style="'+avatarStyle+'">'+avatar+'</div><span class="cell-name">'+escHtml(t.assigned)+'</span></div>';
      }
    },
    {name:"status_col",label:"Status",align:"center",width:85,resize:true,
      template:function(t){
        const s=safeStatus(t.status_key||'');
        const label=t.status_label||'';
        if(!label)return '';
        return '<span class="cell-status'+(s?' status-'+s:'')+'">'+escHtml(label)+'</span>';
      }
    }
  ];

  setScale(currentScale);

  gantt.templates.task_class=function(start,end,task){
    if(task.type===gantt.config.types.project) return 'gantt_project';
    return '';
  };

  gantt.templates.task_text=function(start,end,task){
    if(task.type===gantt.config.types.project) return '';
    return escHtml(task.text);
  };

  gantt.templates.rightside_text=function(start,end,task){
    if(task.type===gantt.config.types.project) return '';
    const dur=gantt.calculateDuration(start,end);
    if(dur<=3) return '<span style="color:#6b7194;font-size:11px;font-weight:500;padding-left:6px">'+escHtml(task.text)+'</span>';
    return '';
  };

  gantt.templates.scale_cell_class=function(date){
    if(date.getDay()===0||date.getDay()===6) return 'weekend';
    return '';
  };

  gantt.templates.timeline_cell_class=function(item,date){
    if(date.getDay()===0||date.getDay()===6) return 'weekend';
    return '';
  };

  gantt.templates.tooltip_text=function(start,end,task){
    if(task.type===gantt.config.types.project){
      const status=task.status_label||'';
      return '<div class="tt-title">'+escHtml(task.text)+'</div>'
        +(status?'<div class="tt-row"><strong>Stato:</strong> '+escHtml(status)+'</div>':'')
        +'<div class="tt-row"><strong>Periodo:</strong> '+fmtDateIt(start)+' → '+fmtDateIt(end)+'</div>';
    }
    const pct=Math.round((task.progress||0)*100);
    const color=safeColor(task.color);
    return '<div class="tt-title" style="border-left:3px solid '+color+';padding-left:8px">'+escHtml(task.text)+'</div>'
      +'<div class="tt-row"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> '+fmtDateIt(start)+' → '+fmtDateIt(end)+'</div>'
      +(task.assigned?'<div class="tt-row"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <strong>'+escHtml(task.assigned)+'</strong></div>':'')
      +'<div class="tt-progress"><div class="tt-progress-bar" style="width:'+pct+'%;background:'+color+'"></div></div>'
      +'<div class="tt-row" style="justify-content:flex-end;margin-top:2px"><span style="font-size:10px;font-weight:700;color:'+color+'">'+pct+'%</span></div>';
  };

  gantt.attachEvent("onAfterTaskDrag",function(id,mode){
    const task=gantt.getTask(id);
    if(!task.phase_id)return;
    const startStr=formatDate(task.start_date);
    const endDate=new Date(task.end_date);endDate.setDate(endDate.getDate()-1);
    const endStr=formatDate(endDate);
    const phaseIdx=ALL_PHASES_RAW.findIndex(p=>p.id===task.phase_id);
    if(phaseIdx>=0){
      ALL_PHASES_RAW[phaseIdx].start_date=startStr;
      ALL_PHASES_RAW[phaseIdx].due_date=endStr;
      ALL_PHASES_RAW[phaseIdx].completed=task.progress>=1;
    }
    fetch('/api/jobs/'+task.job_id+'/phases/'+task.phase_id,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        name:task.phase_name||null,
        start_date:startStr,
        due_date:endStr,
        assigned_to:task.assigned_to||null,
        completed:task.progress>=1,
        task_type_id:task.task_type_id||null,
        color:task.color_raw||null,
        notes:task.notes||null,
        parent_phase_id:task.parent_phase_id||null
      })
    }).catch(err=>console.error('Failed to save phase:',err));
  });

  gantt.attachEvent("onTaskDblClick",function(id,e){
    const task=gantt.getTask(id);
    if(task.job_id){
      window.open('commesse.html?highlight='+task.job_id,'_self');
    }
    return false;
  });
}

function escHtml(s){
  if(!s)return '';
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function safeColor(c){
  if(!c)return '#4f46e5';
  return /^#[0-9a-fA-F]{3,8}$/.test(c)||/^rgb/.test(c)?c:'#4f46e5';
}

function safeStatus(s){
  const allowed=['nuova','in_corso','in_pausa','completata','annullata','preventivo'];
  return allowed.includes(s)?s:'';
}

function safeUrl(u){
  if(!u)return '';
  if(u.startsWith('/')||u.startsWith('https://')||u.startsWith('http://'))return encodeURI(u);
  return '';
}

function fmtDateIt(d){
  if(!d)return '';
  const months=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  return d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
}

function formatDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function setScale(scale){
  currentScale=scale;
  document.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-testid="btn-scale-'+scale+'"]')?.classList.add('active');

  if(scale==='day'){
    gantt.config.scales=[
      {unit:"month",step:1,format:"%F %Y"},
      {unit:"day",step:1,format:"%j",css:function(date){
        const day=['D','L','M','M','G','V','S'][date.getDay()];
        return '';
      }},
    ];
    gantt.config.min_column_width=28;
    gantt.config.scale_height=56;
  }else if(scale==='week'){
    gantt.config.scales=[
      {unit:"month",step:1,format:function(date){
        const months=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
        const d1=date.getDate();
        const end=gantt.date.add(gantt.date.add(date,1,"month"),-1,"day");
        return months[date.getMonth()]+' '+d1+'–'+end.getDate();
      }},
      {unit:"day",step:1,format:function(date){
        const days=['D','L','M','M','G','V','S'];
        return days[date.getDay()];
      }}
    ];
    gantt.config.min_column_width=32;
    gantt.config.scale_height=56;
  }else if(scale==='month'){
    gantt.config.scales=[
      {unit:"year",step:1,format:"%Y"},
      {unit:"month",step:1,format:"%M"}
    ];
    gantt.config.min_column_width=55;
    gantt.config.scale_height=50;
  }else if(scale==='quarter'){
    gantt.config.scales=[
      {unit:"year",step:1,format:"%Y"},
      {unit:"quarter",step:1,format:function(date){
        return "Q"+(Math.floor(date.getMonth()/3)+1);
      }}
    ];
    gantt.config.min_column_width=80;
    gantt.config.scale_height=50;
  }

  if(ganttInitialized) gantt.render();
}

function goToToday(){
  gantt.showDate(new Date());
}

function toggleExpandAll(){
  allExpanded=!allExpanded;
  if(allExpanded){
    gantt.eachTask(function(t){gantt.open(t.id);});
    document.getElementById('expand-label').textContent='Comprimi';
  }else{
    gantt.eachTask(function(t){gantt.close(t.id);});
    document.getElementById('expand-label').textContent='Espandi';
  }
}

function buildGanttData(jobs,phases){
  const tasks=[];

  const phasesByJob={};
  phases.forEach(p=>{
    if(!phasesByJob[p.job_id])phasesByJob[p.job_id]=[];
    phasesByJob[p.job_id].push(p);
  });

  let colorIdx=0;

  jobs.forEach(j=>{
    const jobPhases=phasesByJob[j.id]||[];
    const topPhases=jobPhases.filter(p=>!p.parent_phase_id);

    let jobStart=j.started_at||j.start_date;
    let jobEnd=j.due_date||j.end_date;

    if(topPhases.length>0){
      const phaseStarts=topPhases.filter(p=>p.start_date).map(p=>p.start_date);
      const phaseEnds=topPhases.filter(p=>p.due_date).map(p=>p.due_date);
      if(phaseStarts.length) jobStart=jobStart||phaseStarts.sort()[0];
      if(phaseEnds.length) jobEnd=jobEnd||phaseEnds.sort().reverse()[0];
    }

    if(!jobStart) jobStart=formatDate(new Date());
    if(!jobEnd){
      const d=new Date(jobStart);d.setDate(d.getDate()+7);
      jobEnd=formatDate(d);
    }

    const endD=new Date(jobEnd);endD.setDate(endD.getDate()+1);

    tasks.push({
      id:'job_'+j.id,
      text:(j.client?j.client+' · ':'')+j.code+(j.title?' — '+j.title:''),
      job_code:j.code||'',
      job_title:j.title||'',
      client_name:j.client||'',
      start_date:jobStart,
      end_date:formatDate(endD),
      type:gantt.config.types.project,
      open:true,
      status_key:j.status||'',
      status_label:STATUS_LABELS[j.status]||j.status||'',
      assigned:j.pm_name||'',
      avatar_url:null,
      avatar_color:null,
      job_id:j.id,
      progress:0
    });

    topPhases.forEach((p,pi)=>{
      if(!p.start_date||!p.due_date)return;
      const phEnd=new Date(p.due_date);phEnd.setDate(phEnd.getDate()+1);
      const cat=p.task_type_category||'';
      const color=p.color||DEPT_COLORS[cat]||WRIKE_COLORS[colorIdx%WRIKE_COLORS.length];
      colorIdx++;
      const collab=ALL_COLLABORATORS[p.assigned_to];

      tasks.push({
        id:'phase_'+p.id,
        text:p.task_type_name||p.name,
        phase_name:p.name,
        start_date:p.start_date,
        end_date:formatDate(phEnd),
        parent:'job_'+j.id,
        type:gantt.config.types.task,
        progress:p.completed?1:0,
        color:color,
        textColor:'#fff',
        assigned:p.assigned_name||'',
        avatar_url:collab?.avatar||null,
        avatar_color:color,
        status_key:p.completed?'completata':'in_corso',
        status_label:p.completed?'Completata':'',
        phase_id:p.id,
        job_id:j.id,
        assigned_to:p.assigned_to,
        task_type_id:p.task_type_id,
        color_raw:p.color,
        notes:p.notes,
        parent_phase_id:p.parent_phase_id
      });

      const subPhases=jobPhases.filter(sp=>sp.parent_phase_id===p.id);
      subPhases.forEach(sp=>{
        if(!sp.start_date||!sp.due_date)return;
        const spEnd=new Date(sp.due_date);spEnd.setDate(spEnd.getDate()+1);
        const spCat=sp.task_type_category||'';
        const spColor=sp.color||DEPT_COLORS[spCat]||color;
        const spCollab=ALL_COLLABORATORS[sp.assigned_to];

        tasks.push({
          id:'phase_'+sp.id,
          text:sp.task_type_name||sp.name,
          phase_name:sp.name,
          start_date:sp.start_date,
          end_date:formatDate(spEnd),
          parent:'phase_'+p.id,
          type:gantt.config.types.task,
          progress:sp.completed?1:0,
          color:spColor,
          textColor:'#fff',
          assigned:sp.assigned_name||'',
          avatar_url:spCollab?.avatar||null,
          avatar_color:spColor,
          status_key:sp.completed?'completata':'in_corso',
          status_label:sp.completed?'Completata':'',
          phase_id:sp.id,
          job_id:j.id,
          assigned_to:sp.assigned_to,
          task_type_id:sp.task_type_id,
          color_raw:sp.color,
          notes:sp.notes,
          parent_phase_id:sp.parent_phase_id
        });
      });
    });
  });

  return {data:tasks,links:[]};
}

function applyFilters(){
  const client=document.getElementById('filter-client').value;
  const status=document.getElementById('filter-status').value;
  const search=document.getElementById('search-input').value.toLowerCase().trim();

  let jobs=[...ALL_JOBS];
  if(client) jobs=jobs.filter(j=>j.client===client);
  if(status) jobs=jobs.filter(j=>j.status===status);
  if(search){
    const matchingJobIds=new Set();
    jobs.forEach(j=>{
      const txt=(j.code+' '+j.title+' '+j.client).toLowerCase();
      if(txt.includes(search)) matchingJobIds.add(j.id);
    });
    ALL_PHASES_RAW.forEach(p=>{
      const txt=((p.name||'')+' '+(p.task_type_name||'')+' '+(p.assigned_name||'')).toLowerCase();
      if(txt.includes(search)) matchingJobIds.add(p.job_id);
    });
    jobs=jobs.filter(j=>matchingJobIds.has(j.id));
  }

  document.getElementById('job-count').textContent=jobs.length;

  const data=buildGanttData(jobs,ALL_PHASES_RAW);
  gantt.clearAll();
  gantt.parse(data);
  addTodayMarker();
}

let _todayMarkerId=null;
function addTodayMarker(){
  if(_todayMarkerId && gantt.deleteMarker){
    gantt.deleteMarker(_todayMarkerId);
    _todayMarkerId=null;
  }
  _todayMarkerId=gantt.addMarker({
    start_date:new Date(),
    css:"today-marker",
    text:"Oggi",
    title:"Oggi"
  });
}

async function init(){
  try{
    const [jobs,phases,collabs]=await Promise.all([
      fetch('/api/jobs').then(r=>r.json()),
      fetch('/api/all-phases').then(r=>r.json()),
      fetch('/api/collaborators').then(r=>r.json()).catch(()=>[])
    ]);
    ALL_JOBS=jobs;
    ALL_PHASES_RAW=phases;

    collabs.forEach(c=>{
      ALL_COLLABORATORS[c.id]={name:c.name,avatar:c.avatar||null};
    });

    const clients=[...new Set(jobs.map(j=>j.client))].filter(Boolean).sort();
    const clientSel=document.getElementById('filter-client');
    clientSel.innerHTML='<option value="">Tutti i clienti</option>';
    clients.forEach(c=>{
      const opt=document.createElement('option');
      opt.value=c;opt.textContent=c;
      clientSel.appendChild(opt);
    });

    document.getElementById('job-count').textContent=jobs.length;

    configGantt();
    gantt.init("gantt_here");
    ganttInitialized=true;

    const data=buildGanttData(jobs,phases);
    gantt.parse(data);

    addTodayMarker();
    gantt.showDate(new Date());
  }catch(e){
    console.error('Gantt init error:',e);
  }
}

init();
</script>
