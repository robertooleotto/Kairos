<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Kairos — Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#0f0f17;--paper-h:#16161f;--paper-l:#24242d;
  --paper-s:#cdd0de;--paper-m:#737889;--paper-t:#f9fafb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--paper);color:var(--paper-t);min-height:100vh}

.header{
  display:flex;align-items:center;gap:16px;
  padding:12px 24px;background:var(--paper-h);
  border-bottom:1px solid var(--paper-l);
  position:sticky;top:0;z-index:100;
}
.brand{display:flex;align-items:center;gap:10px}
.brand img{height:40px;object-fit:contain}
.brand span{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:1.1rem;font-weight:500;color:#fff;opacity:.92}
.nav-buttons{display:flex;gap:4px;margin-left:16px;flex-wrap:wrap}
.nav-btn{
  padding:8px 14px;border-radius:8px;border:none;
  background:transparent;color:var(--paper-m);
  font-family:'Sora',sans-serif;font-size:.75rem;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.nav-btn:hover{background:var(--paper-l);color:var(--paper-t)}
.nav-btn.active{background:var(--paper-l);color:var(--paper-t)}

.dashboard{padding:24px;max-width:1400px;margin:0 auto}
.dash-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;margin-bottom:24px}

.kpi-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;margin-bottom:32px;
}
.kpi-card{
  background:var(--paper-h);border:1px solid var(--paper-l);
  border-radius:12px;padding:20px;
}
.kpi-label{font-size:.72rem;color:var(--paper-m);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.kpi-value{font-size:1.8rem;font-weight:700;line-height:1}
.kpi-sub{font-size:.7rem;color:var(--paper-m);margin-top:6px}
.kpi-value.red{color:#ef4444}
.kpi-value.green{color:#22c55e}
.kpi-value.blue{color:#3b82f6}
.kpi-value.amber{color:#f59e0b}

.section-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
@media(max-width:900px){.section-row{grid-template-columns:1fr}}

.panel{
  background:var(--paper-h);border:1px solid var(--paper-l);
  border-radius:12px;padding:20px;
}
.panel-title{font-size:.85rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

.status-bar{display:flex;gap:6px;margin-bottom:12px}
.status-item{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:8px;
  background:var(--paper);font-size:.72rem;font-weight:600;
}
.status-dot{width:8px;height:8px;border-radius:50%}

.dept-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--paper-l);
}
.dept-row:last-child{border-bottom:none}
.dept-icon{font-size:1rem;width:24px;text-align:center}
.dept-name{flex:1;font-size:.78rem;font-weight:600}
.dept-bar-wrap{width:120px;height:6px;background:var(--paper);border-radius:3px;overflow:hidden}
.dept-bar{height:100%;border-radius:3px;transition:width .3s}
.dept-count{font-size:.72rem;color:var(--paper-m);width:40px;text-align:right}

.activity-list{max-height:300px;overflow-y:auto}
.activity-item{
  display:flex;gap:10px;padding:10px 0;
  border-bottom:1px solid var(--paper-l);font-size:.75rem;
}
.activity-item:last-child{border-bottom:none}
.activity-time{color:var(--paper-m);white-space:nowrap;flex-shrink:0;width:60px}
.activity-text{flex:1;color:var(--paper-s)}
.activity-icon{font-size:.9rem;flex-shrink:0}

.deadline-list{max-height:300px;overflow-y:auto}
.deadline-item{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--paper-l);font-size:.75rem;
}
.deadline-item:last-child{border-bottom:none}
.deadline-date{
  padding:4px 8px;border-radius:6px;font-weight:700;
  font-size:.7rem;white-space:nowrap;
}
.deadline-date.overdue{background:rgba(239,68,68,.15);color:#ef4444}
.deadline-date.today{background:rgba(251,191,36,.15);color:#fbbf24}
.deadline-date.upcoming{background:rgba(34,197,94,.15);color:#22c55e}
.deadline-info{flex:1}
.deadline-job{font-weight:600;color:var(--paper-t)}
.deadline-phase{color:var(--paper-m);font-size:.68rem}

.notif-bell{
  position:relative;cursor:pointer;padding:8px;border-radius:8px;
  border:none;background:transparent;color:var(--paper-s);
  transition:all .15s;margin-left:auto;
}
.notif-bell:hover{background:var(--paper-l)}
.notif-badge{
  position:absolute;top:2px;right:2px;
  min-width:16px;height:16px;border-radius:8px;
  background:#ef4444;color:#fff;font-size:.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
}
.notif-badge.hidden{display:none}

.notif-dropdown{
  position:absolute;top:100%;right:0;
  width:360px;max-height:400px;overflow-y:auto;
  background:var(--paper-h);border:1px solid var(--paper-l);
  border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);
  z-index:200;display:none;
}
.notif-dropdown.open{display:block}
.notif-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--paper-l);
}
.notif-header-title{font-size:.8rem;font-weight:700}
.notif-mark-all{
  font-size:.68rem;color:#6366f1;cursor:pointer;
  border:none;background:none;font-family:'Sora',sans-serif;
}
.notif-item{
  display:flex;gap:10px;padding:12px 16px;
  border-bottom:1px solid var(--paper-l);
  cursor:pointer;transition:background .15s;
}
.notif-item:hover{background:var(--paper-l)}
.notif-item.unread{background:rgba(99,102,241,.05)}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#6366f1;flex-shrink:0;margin-top:4px}
.notif-item:not(.unread) .notif-dot{background:transparent}
.notif-content{flex:1;min-width:0}
.notif-title{font-size:.75rem;font-weight:600;margin-bottom:2px}
.notif-msg{font-size:.68rem;color:var(--paper-m);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif-time{font-size:.6rem;color:var(--paper-m);margin-top:4px}
.notif-empty{padding:24px;text-align:center;color:var(--paper-m);font-size:.78rem}
</style>
<script src="auth-guard.js"></script>
</head>
<body>

<div class="header">
  <div class="brand">
    <img src="nudesign-logo.png" alt="NuDesign" style="height:40px;object-fit:contain">
    <span>Kairos</span>
  </div>
  <div class="nav-buttons">
    <button class="nav-btn active" onclick="location.href='dashboard.html'" data-testid="nav-dashboard">Dashboard</button>
    <button class="nav-btn" onclick="location.href='preview.html'" data-testid="nav-calendario">Calendario</button>
    <button class="nav-btn" onclick="location.href='status.html'" data-testid="nav-stato">Stato</button>
    <button class="nav-btn" onclick="location.href='report.html'" data-testid="nav-report">Report</button>
    <button class="nav-btn" onclick="location.href='team.html'" data-testid="nav-team">Team</button>
    <button class="nav-btn" onclick="location.href='commesse.html'" data-testid="nav-commesse">Commesse</button>
    <button class="nav-btn" onclick="location.href='foglio-lavoro.html'" data-testid="nav-foglio">Foglio Lavoro</button>
    <button class="nav-btn" onclick="location.href='clienti.html'" data-testid="nav-clienti">Clienti</button>
    <button class="nav-btn" onclick="location.href='gantt.html'" data-testid="nav-gantt">Gantt</button>
    <button class="nav-btn" onclick="location.href='review.html'" data-testid="nav-review">Review</button>
  </div>
  <div style="position:relative;margin-left:auto" id="notif-container">
    <button class="notif-bell" onclick="toggleNotifications()" data-testid="button-notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-badge hidden" id="notif-count" data-testid="badge-notification-count">0</span>
    </button>
    <div class="notif-dropdown" id="notif-dropdown">
      <div class="notif-header">
        <span class="notif-header-title">Notifiche</span>
        <button class="notif-mark-all" onclick="markAllRead()" data-testid="button-mark-all-read">Segna tutte lette</button>
      </div>
      <div id="notif-list"></div>
    </div>
  </div>
</div>

<div class="dashboard">
  <div class="dash-title" data-testid="text-dashboard-title">Dashboard</div>

  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi-card" data-testid="kpi-active-jobs">
      <div class="kpi-label">Commesse Attive</div>
      <div class="kpi-value blue" id="kpi-active">—</div>
      <div class="kpi-sub" id="kpi-active-sub"></div>
    </div>
    <div class="kpi-card" data-testid="kpi-overdue">
      <div class="kpi-label">Scadenze In Ritardo</div>
      <div class="kpi-value red" id="kpi-overdue">—</div>
      <div class="kpi-sub" id="kpi-overdue-sub"></div>
    </div>
    <div class="kpi-card" data-testid="kpi-phases-done">
      <div class="kpi-label">Fasi Completate</div>
      <div class="kpi-value green" id="kpi-done">—</div>
      <div class="kpi-sub" id="kpi-done-sub"></div>
    </div>
    <div class="kpi-card" data-testid="kpi-due-soon">
      <div class="kpi-label">In Scadenza (7gg)</div>
      <div class="kpi-value amber" id="kpi-soon">—</div>
      <div class="kpi-sub" id="kpi-soon-sub"></div>
    </div>
  </div>

  <div class="section-row">
    <div class="panel" data-testid="panel-status-overview">
      <div class="panel-title">📊 Stato Commesse</div>
      <div id="status-overview"></div>
    </div>
    <div class="panel" data-testid="panel-deadlines">
      <div class="panel-title">⏰ Prossime Scadenze</div>
      <div class="deadline-list" id="deadline-list"></div>
    </div>
  </div>

  <div class="section-row">
    <div class="panel" data-testid="panel-departments">
      <div class="panel-title">🏢 Carico per Reparto</div>
      <div id="dept-workload"></div>
    </div>
    <div class="panel" data-testid="panel-activity">
      <div class="panel-title">📝 Attività Recente</div>
      <div class="activity-list" id="activity-list"></div>
    </div>
  </div>
</div>

<script src="api-client.js"></script>
<script>
const API = window.API || { get: u => fetch(u).then(r=>r.json()) };
let jobs=[], phases=[], areas=[], collabs=[];

async function loadData(){
  try{
    [jobs, phases, areas, collabs] = await Promise.all([
      API.get('/api/jobs'),
      API.get('/api/all-phases'),
      API.get('/api/areas'),
      API.get('/api/collaborators')
    ]);
  }catch(e){ console.error('Dashboard load error:', e); }
  renderKPIs();
  renderStatusOverview();
  renderDeadlines();
  renderDeptWorkload();
  renderActivity();
  loadNotifications();
}

function renderKPIs(){
  const today = new Date().toISOString().slice(0,10);
  const sevenDays = new Date(Date.now()+7*86400000).toISOString().slice(0,10);

  const activeJobs = jobs.filter(j=>j.active && j.status!=='completata' && j.status!=='annullata');
  const overduePhases = phases.filter(p=>!p.completed && p.due_date && p.due_date < today);
  const donePhases = phases.filter(p=>p.completed);
  const soonPhases = phases.filter(p=>!p.completed && p.due_date && p.due_date >= today && p.due_date <= sevenDays);

  document.getElementById('kpi-active').textContent = activeJobs.length;
  document.getElementById('kpi-active-sub').textContent = `su ${jobs.length} totali`;
  document.getElementById('kpi-overdue').textContent = overduePhases.length;
  document.getElementById('kpi-overdue-sub').textContent = overduePhases.length > 0 ? 'da verificare' : 'tutto in regola';
  document.getElementById('kpi-done').textContent = donePhases.length;
  document.getElementById('kpi-done-sub').textContent = `su ${phases.length} totali`;
  document.getElementById('kpi-soon').textContent = soonPhases.length;
  document.getElementById('kpi-soon-sub').textContent = 'prossimi 7 giorni';
}

function renderStatusOverview(){
  const statusMap = {};
  const statusColors = {
    nuova:'#3b82f6', preventivo:'#8b5cf6', 'in corso':'#f59e0b',
    'in pausa':'#6b7280', completata:'#22c55e', annullata:'#ef4444'
  };
  jobs.forEach(j=>{
    const s = (j.status||'nuova').toLowerCase();
    statusMap[s] = (statusMap[s]||0) + 1;
  });
  const el = document.getElementById('status-overview');
  let html = '<div class="status-bar" style="flex-wrap:wrap">';
  for(const [st, count] of Object.entries(statusMap)){
    const color = statusColors[st] || '#6b7280';
    html += `<div class="status-item"><div class="status-dot" style="background:${color}"></div>${st} <strong>${count}</strong></div>`;
  }
  html += '</div>';
  const total = jobs.length || 1;
  html += '<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:2px;margin-top:8px">';
  for(const [st, count] of Object.entries(statusMap)){
    const color = statusColors[st] || '#6b7280';
    const pct = (count/total*100).toFixed(1);
    html += `<div style="width:${pct}%;background:${color};border-radius:3px" title="${st}: ${count}"></div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderDeadlines(){
  const today = new Date().toISOString().slice(0,10);
  const upcoming = phases
    .filter(p=>!p.completed && p.due_date)
    .sort((a,b)=>a.due_date.localeCompare(b.due_date))
    .slice(0,10);

  const el = document.getElementById('deadline-list');
  if(!upcoming.length){
    el.innerHTML='<div class="notif-empty">Nessuna scadenza</div>';
    return;
  }
  el.innerHTML = upcoming.map(p=>{
    const job = jobs.find(j=>j.id===p.job_id);
    const cls = p.due_date < today ? 'overdue' : p.due_date === today ? 'today' : 'upcoming';
    const dateStr = new Date(p.due_date+'T12:00:00').toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    return `<div class="deadline-item" data-testid="deadline-${p.id}">
      <div class="deadline-date ${cls}">${dateStr}</div>
      <div class="deadline-info">
        <div class="deadline-job">${job?escH(job.client)+' — '+escH(job.name):''}</div>
        <div class="deadline-phase">${escH(p.name)}${p.assigned_name?' · '+escH(p.assigned_name):''}</div>
      </div>
    </div>`;
  }).join('');
}

function renderDeptWorkload(){
  const deptCount = {};
  phases.forEach(p=>{
    if(p.completed) return;
    const cat = p.task_type_category || 'Altro';
    deptCount[cat] = (deptCount[cat]||0)+1;
  });
  const maxCount = Math.max(...Object.values(deptCount), 1);
  const el = document.getElementById('dept-workload');
  const sorted = Object.entries(deptCount).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length){
    el.innerHTML='<div class="notif-empty">Nessun dato</div>';
    return;
  }
  el.innerHTML = sorted.map(([cat,count])=>{
    const pct = (count/maxCount*100).toFixed(0);
    const color = cat==='POST-PRODUZIONE'?'#84cc16':cat==='CONCEPT'?'#3b82f6':cat==='MODELLAZIONE'?'#f59e0b':'#8b5cf6';
    return `<div class="dept-row">
      <div class="dept-name">${escH(cat)}</div>
      <div class="dept-bar-wrap"><div class="dept-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="dept-count">${count}</div>
    </div>`;
  }).join('');
}

function renderActivity(){
  const el = document.getElementById('activity-list');
  const activities = [];
  phases.forEach(p=>{
    if(p.completed){
      activities.push({ time: p.created_at, icon:'✅', text:'Fase "'+escH(p.name)+'" completata' });
    }
  });
  jobs.forEach(j=>{
    activities.push({ time: j.created_at, icon:'📋', text:'Commessa "'+escH(j.client)+' — '+escH(j.name)+'" creata' });
  });
  activities.sort((a,b)=>new Date(b.time)-new Date(a.time));
  const recent = activities.slice(0,15);
  if(!recent.length){
    el.innerHTML='<div class="notif-empty">Nessuna attività</div>';
    return;
  }
  el.innerHTML = recent.map(a=>{
    const d = new Date(a.time);
    const timeStr = d.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    return `<div class="activity-item">
      <div class="activity-icon">${a.icon}</div>
      <div class="activity-text">${a.text}</div>
      <div class="activity-time">${timeStr}</div>
    </div>`;
  }).join('');
}

let notifications = [];
async function loadNotifications(){
  try{
    notifications = await API.get('/api/notifications');
    renderNotifications();
  }catch(e){}
}

function renderNotifications(){
  const unread = notifications.filter(n=>!n.read).length;
  const badge = document.getElementById('notif-count');
  badge.textContent = unread;
  badge.classList.toggle('hidden', unread===0);

  const list = document.getElementById('notif-list');
  if(!notifications.length){
    list.innerHTML='<div class="notif-empty">Nessuna notifica</div>';
    return;
  }
  list.innerHTML = notifications.slice(0,20).map(n=>{
    const d = new Date(n.created_at);
    const timeStr = d.toLocaleDateString('it-IT',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    return `<div class="notif-item ${n.read?'':'unread'}" onclick="openNotification(${n.id},'${(n.link||'').replace(/'/g,"\\'")}')" data-testid="notif-${n.id}">
      <div class="notif-dot"></div>
      <div class="notif-content">
        <div class="notif-title">${escH(n.title)}</div>
        <div class="notif-msg">${escH(n.message||'')}</div>
        <div class="notif-time">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
}

function escH(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleNotifications(){
  document.getElementById('notif-dropdown').classList.toggle('open');
}

async function openNotification(id, link){
  try{
    await fetch(`/api/notifications/${id}/read`,{method:'PATCH',credentials:'include'});
    const n = notifications.find(x=>x.id===id);
    if(n) n.read = true;
    renderNotifications();
  }catch(e){}
  if(link) window.location.href = link;
}

async function markAllRead(){
  try{
    await fetch('/api/notifications/mark-all-read',{method:'POST',credentials:'include'});
    notifications.forEach(n=>n.read=true);
    renderNotifications();
  }catch(e){}
}

document.addEventListener('click', e=>{
  const dd = document.getElementById('notif-dropdown');
  const cont = document.getElementById('notif-container');
  if(dd.classList.contains('open') && !cont.contains(e.target)){
    dd.classList.remove('open');
  }
});

loadData();
</script>
</body>
</html>
