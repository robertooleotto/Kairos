<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Kairos — Commesse</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#0f0f17;--paper-h:#16161f;--paper-l:#24242d;
  --paper-s:#cdd0de;--paper-m:#737889;--paper-t:#f9fafb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--paper);color:var(--paper-t);min-height:100vh}

/* Header */
.header{padding:14px 24px;border-bottom:1px solid var(--paper-l);display:flex;align-items:center;gap:16px;position:sticky;top:0;background:var(--paper);z-index:100;}
.brand{flex-shrink:0;display:flex;align-items:center;gap:10px}
.header-actions{display:flex;gap:8px;align-items:center;margin-left:auto}
.nav-pills{display:flex;gap:2px;background:rgba(255,255,255,.05);border-radius:10px;padding:3px;position:absolute;left:50%;transform:translateX(-50%)}
.nav-pill{padding:5px 16px;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--paper-m);font-family:'Sora',sans-serif;transition:all .15s}
.nav-pill.active{background:#1c1f30;color:var(--paper-t)}
.nav-pill:hover:not(.active){color:var(--paper-s)}

/* Container */
.container{padding:24px;max-width:1400px;margin:0 auto}

/* Buttons */
.btn-primary{padding:8px 16px;border-radius:8px;font-size:.74rem;font-weight:600;background:#6366f1;color:#fff;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'Sora',sans-serif;transition:all .15s}
.btn-primary:hover{background:#5558e3}

/* Bulk Actions Toolbar */
.bulk-toolbar{
  display:none;
  background:rgba(99,102,241,.1);
  border:1px solid rgba(99,102,241,.3);
  border-radius:10px;
  padding:12px 16px;
  margin-bottom:20px;
  align-items:center;
  justify-content:space-between;
  animation:slideDown .2s ease;
}
.bulk-toolbar.active{display:flex}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}
.bulk-info{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:.75rem;
  color:var(--paper-t);
}
.bulk-count{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:24px;
  height:24px;
  padding:0 8px;
  border-radius:12px;
  background:#6366f1;
  color:#fff;
  font-size:.7rem;
  font-weight:700;
}
.bulk-actions{
  display:flex;
  gap:8px;
  align-items:center;
}
.bulk-select{
  padding:6px 12px;
  border-radius:8px;
  background:var(--paper-h);
  border:1px solid var(--paper-l);
  color:var(--paper-t);
  font-family:'Sora',sans-serif;
  font-size:.72rem;
  cursor:pointer;
  outline:none;
}
.bulk-select:hover{border-color:var(--paper-m)}
.bulk-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  border-radius:8px;
  background:var(--paper-h);
  border:1px solid var(--paper-l);
  color:var(--paper-s);
  font-size:.72rem;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
  font-family:'Sora',sans-serif;
}
.bulk-btn:hover{background:var(--paper-l);color:var(--paper-t)}

/* Filters */
.filters{display:flex;gap:12px;margin-bottom:24px;align-items:center;flex-wrap:wrap}
.filter-label{font-size:.7rem;color:var(--paper-m);font-weight:600}
.filter-select{
  padding:8px 12px;border-radius:8px;
  background:var(--paper-h);border:1px solid var(--paper-l);
  color:var(--paper-t);font-family:'Sora',sans-serif;
  font-size:.75rem;cursor:pointer;outline:none;
}
.filter-select:hover{border-color:var(--paper-m)}
.search-box{
  padding:8px 12px;border-radius:8px;
  background:var(--paper-h);border:1px solid var(--paper-l);
  color:var(--paper-t);font-family:'Sora',sans-serif;
  font-size:.75rem;outline:none;width:240px;
}
.search-box:focus{border-color:#6366f1}

/* Jobs table */
.jobs-table{background:var(--paper-h);border:1px solid var(--paper-l);border-radius:12px;overflow:hidden}
.job-row{
  display:grid;
  grid-template-columns:40px 120px 200px 140px 1fr 140px 100px;
  gap:16px;padding:14px 18px;
  border-bottom:1px solid var(--paper-l);
  align-items:center;
  cursor:pointer;
  transition:background .15s;
}
.job-row:hover{background:rgba(99,102,241,.05)}
.job-row:last-child{border-bottom:none}
.job-header{
  display:grid;
  grid-template-columns:40px 120px 200px 140px 1fr 140px 100px;
  gap:16px;padding:12px 18px;
  background:rgba(255,255,255,.02);
  font-size:.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  color:var(--paper-m);
}

/* Checkbox */
.job-checkbox{
  width:18px;
  height:18px;
  cursor:pointer;
  accent-color:#6366f1;
}

/* Columns */
.job-code{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;display:flex;align-items:center;gap:6px}
.job-emoji{font-size:.85rem}
.job-client{font-size:.75rem;color:var(--paper-s)}
.job-type{
  display:inline-flex;padding:3px 8px;border-radius:6px;
  font-size:.62rem;font-weight:600;
}
.type-I{background:rgba(139,92,246,.15);color:#c4b5fd}
.type-F{background:rgba(34,197,94,.15);color:#86efac}
.type-A{background:rgba(59,130,246,.15);color:#93c5fd}
.type-V{background:rgba(245,158,11,.15);color:#fcd34d}

/* Progress */
.job-progress{display:flex;flex-direction:column;gap:4px}
.progress-bar{height:6px;background:var(--paper-l);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#6366f1;border-radius:3px;transition:width .3s}
.progress-text{font-size:.65rem;color:var(--paper-m);font-family:'JetBrains Mono',monospace}

/* Team chips */
.team-chips{display:flex;gap:4px;flex-wrap:wrap}
.team-chip{
  padding:3px 8px;border-radius:6px;
  background:var(--paper-l);color:var(--paper-s);
  font-size:.62rem;font-weight:600;
}

/* Deadline */
.job-deadline{font-size:.7rem;color:var(--paper-s)}
.days-left{font-size:.65rem;color:var(--paper-m);font-family:'JetBrains Mono',monospace}
.deadline-warning{color:#f59e0b}
.deadline-critical{color:#ef4444}

/* Priority badge */
.prio-badge{
  display:inline-flex;padding:3px 8px;border-radius:6px;
  font-size:.6rem;font-weight:600;
}
.prio-URGENT{background:rgba(239,68,68,.15);color:#fca5a5}
.prio-HIGH{background:rgba(245,158,11,.15);color:#fcd34d}
.prio-MEDIUM{background:rgba(59,130,246,.15);color:#93c5fd}
.prio-LOW{background:rgba(107,114,128,.15);color:#9ca3af}

/* Stats bar */
.stats-bar{
  display:flex;gap:24px;margin-bottom:20px;
  padding:16px 20px;background:var(--paper-h);
  border:1px solid var(--paper-l);border-radius:10px;
}
.stat-item{display:flex;flex-direction:column;gap:4px}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--paper-t)}
.stat-label{font-size:.65rem;color:var(--paper-m);text-transform:uppercase;letter-spacing:.05em}

/* Empty state */
.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--paper-m);font-size:.8rem;
}

/* View toggle */
.view-toggle-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:8px;
  background:var(--paper-h);border:1px solid var(--paper-l);
  color:var(--paper-s);font-size:.72rem;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;
}
.view-toggle-btn:hover{background:var(--paper-l)}
.view-toggle-btn.active{background:rgba(99,102,241,.15);color:#a5b4fc;border-color:rgba(99,102,241,.3)}

/* Kanban Board */
.kanban-board{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  display:none;
}
.kanban-board.active{display:grid}

.kanban-column{
  background:var(--paper-h);
  border:1px solid var(--paper-l);
  border-radius:12px;
  padding:16px;
  min-height:400px;
}
.kanban-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-bottom:12px;
  border-bottom:1px solid var(--paper-l);
}
.kanban-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--paper-t)}
.kanban-count{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:22px;height:22px;padding:0 6px;border-radius:11px;
  background:rgba(99,102,241,.15);color:#a5b4fc;
  font-size:.65rem;font-weight:600;
}
.kanban-cards{display:flex;flex-direction:column;gap:10px}

/* Kanban Card */
.kanban-card{
  background:var(--paper);
  border:1px solid var(--paper-l);
  border-radius:10px;
  padding:12px;
  cursor:grab;
  transition:all .2s;
}
.kanban-card:active{cursor:grabbing}
.kanban-card:hover{
  border-color:rgba(99,102,241,.3);
  box-shadow:0 4px 12px rgba(0,0,0,.15);
  transform:translateY(-2px);
}
.kanban-card.dragging{opacity:.5;transform:rotate(2deg)}
.card-emoji{font-size:.9rem;margin-bottom:6px}
.card-code{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600;margin-bottom:4px}
.card-client{font-size:.68rem;color:var(--paper-m);margin-bottom:8px}
.card-team{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.card-team-chip{
  padding:2px 6px;border-radius:4px;
  background:var(--paper-l);color:var(--paper-s);
  font-size:.6rem;font-weight:600;
}
.card-progress{
  display:flex;align-items:center;gap:6px;
  margin-bottom:6px;
}
.card-progress-bar{flex:1;height:4px;background:var(--paper-l);border-radius:2px;overflow:hidden}
.card-progress-fill{height:100%;background:#6366f1;border-radius:2px}
.card-progress-text{font-size:.62rem;color:var(--paper-m);font-family:'JetBrains Mono',monospace}
.card-deadline{font-size:.65rem;color:var(--paper-m);display:flex;align-items:center;gap:4px}
.card-deadline.warning{color:#f59e0b}
.card-deadline.critical{color:#ef4444}

/* Detail Panel */
.detail-panel{
  position:fixed;top:0;right:-600px;
  width:600px;height:100vh;
  z-index:1000;
  transition:right .3s ease;
}
.detail-panel.open{right:0}
.detail-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0);
  pointer-events:none;
  transition:background .3s;
}
.detail-panel.open .detail-overlay{
  background:rgba(0,0,0,.4);
  pointer-events:auto;
}
.detail-content{
  position:absolute;top:0;right:0;
  width:600px;height:100%;
  background:var(--paper-h);
  box-shadow:-4px 0 20px rgba(0,0,0,.3);
  display:flex;flex-direction:column;
}
.detail-header{
  padding:24px;
  border-bottom:1px solid var(--paper-l);
  display:flex;align-items:flex-start;justify-content:space-between;
}
.detail-code{
  font-family:'JetBrains Mono',monospace;
  font-size:1.1rem;font-weight:600;
  margin-bottom:4px;
}
.detail-client{
  font-size:.8rem;color:var(--paper-m);
}
.detail-close{
  background:none;border:none;
  color:var(--paper-s);
  cursor:pointer;padding:6px;
  border-radius:6px;
  transition:all .15s;
}
.detail-close:hover{
  background:var(--paper-l);
  color:var(--paper-t);
}
.detail-body{
  flex:1;overflow-y:auto;
  padding:24px;
}
.detail-section{
  margin-bottom:24px;
  padding-bottom:24px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.detail-section:last-child{border-bottom:none}
.detail-section-title{
  font-size:.75rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--paper-m);
  margin-bottom:12px;
}
.detail-info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.detail-info-item{
  display:flex;flex-direction:column;gap:4px;
}
.detail-info-label{
  font-size:.68rem;
  color:var(--paper-m);
}
.detail-info-value{
  font-size:.8rem;
  font-weight:600;
  color:var(--paper-t);
}
.detail-team-list{
  display:flex;gap:6px;flex-wrap:wrap;
}
.detail-team-chip{
  padding:6px 12px;border-radius:8px;
  background:var(--paper-l);
  color:var(--paper-s);
  font-size:.72rem;font-weight:600;
}
.detail-actions{
  display:flex;gap:8px;
  padding:20px 24px;
  border-top:1px solid var(--paper-l);
}
.detail-btn{
  flex:1;
  padding:10px 16px;
  border-radius:8px;
  border:none;
  font-size:.75rem;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
  font-family:'Sora',sans-serif;
}
.detail-btn-primary{
  background:#6366f1;
  color:#fff;
}
.detail-btn-primary:hover{background:#5558e3}
.detail-btn-secondary{
  background:var(--paper-l);
  color:var(--paper-s);
}
.detail-btn-secondary:hover{background:var(--paper);color:var(--paper-t)}
.detail-btn-danger{
  background:rgba(239,68,68,.15);
  color:#fca5a5;
}
.detail-btn-danger:hover{background:rgba(239,68,68,.25)}

/* Progress widget styles */
.progress-widget{
  background:var(--paper);
  border:1px solid var(--paper-l);
  border-radius:10px;
  padding:16px;
  margin-bottom:24px;
}
.progress-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}
.progress-title{
  font-size:.75rem;
  font-weight:600;
  color:var(--paper-s);
}
.progress-status{
  padding:4px 10px;
  border-radius:6px;
  font-size:.68rem;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  gap:4px;
}
.progress-status.ahead{background:rgba(34,197,94,.12);color:#4ade80}
.progress-status.ontime{background:rgba(59,130,246,.12);color:#93c5fd}
.progress-status.behind{background:rgba(239,68,68,.12);color:#f87171}
.progress-bars{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:12px;
}
.progress-bar-row{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.progress-bar-label{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:.68rem;
}
.progress-bar-label span:first-child{color:var(--paper-m)}
.progress-bar-label span:last-child{color:var(--paper-s);font-family:'JetBrains Mono',monospace}
.progress-bar-track{
  height:8px;
  background:var(--paper-l);
  border-radius:4px;
  overflow:hidden;
}
.progress-bar-fill{
  height:100%;
  border-radius:4px;
  transition:width .3s;
}
.progress-bar-fill.work{background:#6366f1}
.progress-bar-fill.time{background:rgba(107,114,128,.4)}
.progress-message{
  padding:10px 12px;
  border-radius:8px;
  border-left:3px solid;
  font-size:.72rem;
  line-height:1.5;
}
.progress-message.ahead{background:rgba(34,197,94,.08);border-color:#4ade80;color:#86efac}
.progress-message.ontime{background:rgba(59,130,246,.08);border-color:#93c5fd;color:#bfdbfe}
.progress-message.behind{background:rgba(239,68,68,.08);border-color:#f87171;color:#fca5a5}

/* Phase Timeline */
.phases-section{margin-top:20px}
.phases-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.phases-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--paper-m)}
.btn-add-phase{
  padding:5px 12px;border-radius:7px;background:#6366f1;color:#fff;border:none;
  font-size:.68rem;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;
  display:inline-flex;align-items:center;gap:4px;transition:background .15s
}
.btn-add-phase:hover{background:#5558e3}
.phase-list{display:flex;flex-direction:column;gap:0}
.phase-item{
  display:flex;align-items:stretch;gap:0;position:relative;
}
.phase-track{
  width:32px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  position:relative;
}
.phase-dot{
  width:12px;height:12px;border-radius:50%;border:2px solid var(--paper-l);
  background:var(--paper-h);z-index:2;flex-shrink:0;margin-top:14px;
}
.phase-dot.completed{background:#22c55e;border-color:#22c55e}
.phase-dot.active{background:#6366f1;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.25)}
.phase-line{
  width:2px;flex:1;background:var(--paper-l);
}
.phase-card{
  flex:1;background:var(--paper);border:1px solid var(--paper-l);border-radius:10px;
  padding:14px 16px;margin:6px 0;transition:all .15s;cursor:pointer;
}
.phase-card:hover{border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.03)}
.phase-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.phase-name{font-size:.8rem;font-weight:600;color:var(--paper-t)}
.phase-badge{
  padding:2px 8px;border-radius:5px;font-size:.6rem;font-weight:600;
  white-space:nowrap;
}
.phase-dates{display:flex;gap:12px;font-size:.68rem;color:var(--paper-m);margin-bottom:6px;align-items:center}
.phase-dates svg{flex-shrink:0}
.phase-bar-track{height:4px;background:var(--paper-l);border-radius:2px;overflow:hidden;margin-top:8px}
.phase-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.phase-assignee{font-size:.68rem;color:var(--paper-m);display:flex;align-items:center;gap:4px;margin-top:6px}
.phase-notes{font-size:.68rem;color:var(--paper-m);font-style:italic;margin-top:4px}
.phase-actions{display:flex;gap:4px;align-items:center}
.phase-action-btn{
  background:none;border:none;color:var(--paper-m);cursor:pointer;padding:3px;
  border-radius:4px;transition:all .15s;display:inline-flex;
}
.phase-action-btn:hover{background:var(--paper-l);color:var(--paper-t)}
.phase-empty{
  text-align:center;padding:30px 20px;color:var(--paper-m);font-size:.78rem;
  border:1px dashed var(--paper-l);border-radius:10px;
}

/* Phase Form Modal */
.phase-form-overlay{
  display:none;position:fixed;inset:0;z-index:1100;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.phase-form-box{
  background:var(--paper-h);border:1px solid var(--paper-l);border-radius:14px;
  width:480px;max-width:92vw;padding:24px 28px;
}
.pf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.pf-full{grid-column:span 2}
.pf-label{font-size:.7rem;font-weight:600;color:var(--paper-s);display:block;margin-bottom:4px}
.pf-input{
  width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--paper-l);
  background:var(--paper);color:var(--paper-t);font-family:'Sora',sans-serif;font-size:.78rem;outline:none;
}
.pf-input:focus{border-color:#6366f1}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
<style>
@media print {
  .header, .bulk-toolbar, .filters, .kanban-board, .detail-panel, .phase-form-overlay,
  #job-form-modal, .job-checkbox, .view-toggle-btn, .header-actions { display: none !important; }
  body { background: #fff !important; color: #000 !important; }
  .container { max-width: 100% !important; padding: 10px !important; }
  .stats-bar { background: #f5f5f5 !important; border: 1px solid #ccc !important; }
  .stat-value { color: #000 !important; }
  .stat-label { color: #555 !important; }
  .jobs-table { background: #fff !important; border: 1px solid #ccc !important; }
  .job-header { background: #f0f0f0 !important; color: #333 !important; }
  .job-row { border-bottom: 1px solid #ccc !important; background: #fff !important; }
  .job-row:hover { background: #fff !important; }
  .job-code, .job-client, .job-deadline, .days-left { color: #000 !important; }
  .team-chip { background: #eee !important; color: #333 !important; }
  .job-type, .prio-badge { border: 1px solid #999 !important; background: #f0f0f0 !important; color: #333 !important; }
  @page { size: landscape; margin: 10mm; }
}
</style>
<script src="auth-guard.js"></script>
<script src="notifications.js" defer></script>
</head>
<body>

<div class="header">
  <div class="brand">

<script>
let JOBS=[];
let filteredJobs=[];
let currentView='list';

const STATUS_MAP={nuova:'TODO',in_produzione:'IN_PROGRESS',in_attesa:'WAITING',completata:'DONE',annullata:'DONE'};
const STATUS_REVERSE={TODO:'nuova',IN_PROGRESS:'in_produzione',WAITING:'in_attesa',DONE:'completata'};

function normalizeJob(j){
  const d=j.due_date?j.due_date.slice(0,10):null;
  const dL=d?getDaysLeft(d):999;
  const prio=dL<3?'URGENT':dL<7?'HIGH':dL<14?'MEDIUM':'LOW';
  const team=[j.pm_name,j.rp_name,j.art_dir_name,j.photography_name].filter(Boolean);
  return{
    id:j.id,code:j.code||j.title,title:j.title,
    type:j.type||'—',client:j.client||'—',
    prio,dueDate:d,startedAt:j.started_at?j.started_at.slice(0,10):null,
    team,status:STATUS_MAP[j.status]||'TODO',apiStatus:j.status,
    category:j.category||'',
    notes:j.notes||'',competence_year:j.competence_year||2026,
    pm_id:j.pm_id||'',art_dir_id:j.art_dir_id||'',
    pm_name:j.pm_name||'',art_dir_name:j.art_dir_name||''
  };
}

async function loadData(){
  try{
    const [rawJobs]=await Promise.all([fetch('/api/jobs').then(r=>r.json())]);
    JOBS=(rawJobs||[]).map(normalizeJob);
  }catch(e){console.error('Errore caricamento commesse:',e);JOBS=[];}
  filteredJobs=[...JOBS];
}

function switchView(view){
  currentView=view;
  document.getElementById('view-list').classList.toggle('active',view==='list');
  document.getElementById('view-kanban').classList.toggle('active',view==='kanban');
  document.getElementById('list-view').style.display=view==='list'?'block':'none';
  document.getElementById('kanban-view').classList.toggle('active',view==='kanban');
  if(view==='kanban') renderKanban();
}

function renderKanban(){
  const columns=['TODO','IN_PROGRESS','WAITING','DONE'];
  columns.forEach(col=>{
    const jobs=filteredJobs.filter(j=>j.status===col);
    document.getElementById('count-'+col).textContent=jobs.length;
    const container=document.getElementById('cards-'+col);
    container.innerHTML=jobs.map(j=>{
      const emoji=getProgressEmoji(j);
      const daysLeft=j.dueDate?getDaysLeft(j.dueDate):null;
      const daysClass=daysLeft!==null&&daysLeft<3?'critical':daysLeft!==null&&daysLeft<7?'warning':'';
      const teamChips=(j.team||[]).map(p=>`<span class="card-team-chip">${p}</span>`).join('');

let draggedJobId=null;
function drag(event,jobId){
  draggedJobId=jobId;
  event.target.classList.add('dragging');
}
function allowDrop(event){ event.preventDefault(); }
async function drop(event,newStatus){
  event.preventDefault();
  if(!draggedJobId)return;
  const job=JOBS.find(j=>j.id===draggedJobId);
  if(job){
    job.status=newStatus;
    try{
      await fetch(`/api/jobs/${job.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({...job,status:STATUS_REVERSE[newStatus]||'nuova',
          type:job.type,areas_csv:'',client:job.client,started_at:job.startedAt,due_date:job.dueDate})});
    }catch(e){console.error('Errore aggiornamento stato:',e);}
    renderKanban();
  }
  draggedJobId=null;
  document.querySelectorAll('.kanban-card').forEach(c=>c.classList.remove('dragging'));
}

function getProgressEmoji(job){
  if(job.status==='DONE')return'✓';
  if(job.status==='WAITING')return'⏸';
  if(!job.dueDate)return'→';
  const dL=getDaysLeft(job.dueDate);
  if(dL<0)return'↓';
  if(dL<3)return'↓';
  return'→';
}

function getDaysLeft(dueDate){
  const today=new Date();
  today.setHours(0,0,0,0);
  const due=new Date(dueDate);
  return Math.ceil((due-today)/(1000*60*60*24));
}

function applyFilters(){
  const clientFilter=document.getElementById('filter-client').value;

  const prioFilter=document.getElementById('filter-prio').value;
  const search=document.getElementById('search-box').value.toLowerCase();
  filteredJobs=JOBS.filter(j=>{
    if(clientFilter&&j.client!==clientFilter)return false;
    if(typeFilter&&j.type!==typeFilter)return false;

  if(currentView==='kanban') renderKanban();
}

async function changeJobStatus(jobId){
  const job=JOBS.find(j=>j.id===jobId);
  if(!job)return;
  const statuses=['TODO','IN_PROGRESS','WAITING','DONE'];
  const labels=['📋 Da fare','🔥 In lavorazione','⏸️ In attesa','✓ Completata'];
  const choice=prompt('Cambia stato a:\n1. '+labels[0]+'\n2. '+labels[1]+'\n3. '+labels[2]+'\n4. '+labels[3]);
  if(choice>=1&&choice<=4){
    job.status=statuses[choice-1];
    try{
      await fetch(`/api/jobs/${job.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({code:job.code,title:job.title,type:job.type,areas_csv:'',
          status:STATUS_REVERSE[job.status]||'nuova',client:job.client,
          started_at:job.startedAt,due_date:job.dueDate})});
    }catch(e){console.error('Errore aggiornamento stato:',e);}
    closeJobDetail();
    if(currentView==='kanban') renderKanban(); else renderJobs();
  }
}

function renderProgressWidget(job){
  if(!job.startedAt||!job.dueDate){
    return`<div class="progress-widget">
      <div class="progress-header">
        <span class="progress-title">Avanzamento temporale</span>
        <span class="progress-status ontime">⏸ Date non definite</span>
      </div>
      <div style="font-size:.68rem;color:var(--paper-m);font-style:italic">Nessuna data di inizio o scadenza</div>
    </div>`;
  }
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(job.startedAt);
  const due=new Date(job.dueDate);
  const totalDays=Math.max(1,Math.ceil((due-start)/(1000*60*60*24)));
  const elapsedDays=Math.max(0,Math.ceil((today-start)/(1000*60*60*24)));
  const timePct=Math.round((elapsedDays/totalDays)*100);
  const dL=getDaysLeft(job.dueDate);
  let status,emoji,message;
  if(job.status==='DONE'){status='ahead';emoji='✓';message='Completata';}
  else if(dL<0){status='behind';emoji='↓';message=`Scaduta da ${-dL} giorni`;}
  else if(dL<3){status='behind';emoji='↓';message=`Urgente — scade in ${dL}gg`;}
  else if(timePct<80){status='ontime';emoji='→';message='Nei tempi previsti';}
  else{status='ontime';emoji='→';message=`${dL} giorni rimanenti`;}
  return`<div class="progress-widget">
    <div class="progress-header">
      <span class="progress-title">Avanzamento temporale</span>
      <span class="progress-status ${status}">${emoji} ${status==='ahead'?'Completata':status==='ontime'?'Nei tempi':'In ritardo'}</span>
    </div>
    <div class="progress-bars">
      <div class="progress-bar-row">
        <div class="progress-bar-label"><span>Tempo trascorso</span><span><strong>${elapsedDays}</strong> / ${totalDays} gg (${Math.min(timePct,100)}%)</span></div>
        <div class="progress-bar-track"><div class="progress-bar-fill time" style="width:${Math.min(timePct,100)}%"></div></div>
      </div>
    </div>
    <div class="progress-message ${status}">${emoji} ${message}</div>
  </div>`;
}

  const payload={
    name:document.getElementById('pf-name').value.trim(),
    task_type_id:taskTypeId||null,
    start_date:document.getElementById('pf-start').value||null,
    due_date:document.getElementById('pf-due').value||null,
    assigned_to:document.getElementById('pf-assigned').value||null,
    color:document.getElementById('pf-color').value||'#6366f1',
    notes:document.getElementById('pf-notes').value.trim()||null,
    order_index:phaseId?undefined:CURRENT_JOB_PHASES.length
  };
  if(!payload.name){alert('Il nome della fase è obbligatorio');return}
  try{
    if(phaseId){
      await fetch(`/api/jobs/${jobId}/phases/${phaseId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    }else{
      await fetch(`/api/jobs/${jobId}/phases`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    }
    closePhaseForm();
    await openJobDetail(jobId);
  }catch(err){
    console.error('Errore salvataggio fase:',err);
    alert('Errore nel salvataggio della fase');
  }
}

async function deletePhase(jobId,phaseId){
  if(!confirm('Eliminare questa fase di lavorazione?'))return;
  try{
    await fetch(`/api/jobs/${jobId}/phases/${phaseId}`,{method:'DELETE'});
    await openJobDetail(jobId);
  }catch(err){
    console.error('Errore eliminazione fase:',err);
  }
}

async function togglePhaseComplete(jobId,phaseId,completed){
  try{
    await fetch(`/api/jobs/${jobId}/phases/${phaseId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({completed})});
    await openJobDetail(jobId);
  }catch(err){
    console.error('Errore aggiornamento fase:',err);
  }
}

let CLIENTS_LIST=[];
let COLLABS_LIST=[];
let EDITING_JOB=null;

async function loadFormData(){
  try{
    const [clients,collabs]=await Promise.all([
      fetch('/api/clients').then(r=>r.json()),
      fetch('/api/collaborators').then(r=>r.json())
    ]);
    CLIENTS_LIST=clients||[];
    COLLABS_LIST=collabs||[];
  }catch(e){console.error('Errore caricamento dati form:',e)}
}

function populateFormDropdowns(){
  const clientSel=document.getElementById('jf-client');
  clientSel.innerHTML='<option value="">— Seleziona cliente —</option>';
  CLIENTS_LIST.forEach(c=>{
    clientSel.innerHTML+=`<option value="${c.name}">${c.name}</option>`;
  });
  ['jf-pm','jf-artdir'].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML='<option value="">— Nessuno —</option>';
    COLLABS_LIST.forEach(c=>{
      sel.innerHTML+=`<option value="${c.id}">${c.name}</option>`;
    });
  });
}

function openJobForm(job){
  EDITING_JOB=job||null;
  loadFormData().then(()=>{
    populateFormDropdowns();
    if(job){
      document.getElementById('job-form-title').textContent='Modifica Commessa';
      document.getElementById('jf-submit-btn').textContent='Aggiorna Commessa';
      document.getElementById('jf-id').value=job.id;
      document.getElementById('jf-title').value=job.title||'';
      document.getElementById('jf-code').value=job.code||'';
      document.getElementById('jf-client').value=job.client||'';
      document.getElementById('jf-type').value=job.type||'C';
      document.getElementById('jf-status').value=job.apiStatus||'nuova';
      document.getElementById('jf-started').value=job.startedAt||'';
      document.getElementById('jf-due').value=job.dueDate||'';
      document.getElementById('jf-year').value=job.competence_year||2026;
      document.getElementById('jf-category').value=job.category||'';
      document.getElementById('jf-notes').value=job.notes||'';
      document.getElementById('jf-pm').value=job.pm_id||'';
      document.getElementById('jf-artdir').value=job.art_dir_id||'';
    }else{
      document.getElementById('job-form-title').textContent='Nuova Commessa';
      document.getElementById('jf-submit-btn').textContent='Salva Commessa';
      document.getElementById('job-form').reset();
      document.getElementById('jf-year').value=new Date().getFullYear();
    }
    document.getElementById('job-form-modal').style.display='flex';
  });
}

function closeJobForm(){
  document.getElementById('job-form-modal').style.display='none';
  EDITING_JOB=null;
}

async function deleteJob(jobId){
  const job=JOBS.find(j=>j.id===jobId);
  if(!job)return;
  if(!confirm(`Eliminare la commessa "${job.code}"?`))return;
  try{
    await fetch(`/api/jobs/${jobId}`,{method:'DELETE'});
    closeJobDetail();
    await loadData();
    filteredJobs=[...JOBS];
    applyFilters();
    updateStats();
    renderJobs();
    if(currentView==='kanban') renderKanban();
  }catch(err){
    console.error('Errore eliminazione commessa:',err);
    alert('Errore nella eliminazione');
  }
}

async function submitJobForm(e){
  e.preventDefault();
  const payload={
    title:document.getElementById('jf-title').value.trim(),
    code:document.getElementById('jf-code').value.trim()||document.getElementById('jf-title').value.trim(),
    client:document.getElementById('jf-client').value||null,
    type:document.getElementById('jf-type').value,
    status:document.getElementById('jf-status').value,
    started_at:document.getElementById('jf-started').value||null,
    due_date:document.getElementById('jf-due').value||null,
    competence_year:parseInt(document.getElementById('jf-year').value)||2026,
    category:document.getElementById('jf-category').value.trim()||null,
    notes:document.getElementById('jf-notes').value.trim()||null,
    pm_id:document.getElementById('jf-pm').value||null,
    art_dir_id:document.getElementById('jf-artdir').value||null
  };
  if(!payload.title){alert('Il titolo è obbligatorio');return}
  try{
    const id=document.getElementById('jf-id').value;
    if(id){
      await fetch(`/api/jobs/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    }else{
      await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    }
    closeJobForm();
    await loadData();
    filteredJobs=[...JOBS];
    applyFilters();
    updateStats();
    renderJobs();
    if(currentView==='kanban') renderKanban();
  }catch(err){
    console.error('Errore salvataggio commessa:',err);
    alert('Errore nel salvataggio della commessa');
  }
}

async function loadSyncStatus(jobId){
  const area=document.getElementById('sync-status-area');
  if(!area)return;
  try{
    const data=await fetch(`/api/calendar/sync-status/${jobId}`).then(r=>r.json());
    if(data.synced){
      const lastSync=new Date(data.last_sync).toLocaleString('it-IT',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      area.innerHTML=`<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px;margin-top:16px" data-testid="status-sync-gcal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span style="font-size:.72rem;color:#86efac;font-weight:600">Sincronizzato con Google Calendar</span>
        <span style="font-size:.65rem;color:var(--paper-m);margin-left:auto">${data.count} eventi &middot; ${lastSync}</span>
      </div>`;
    }else{
      area.innerHTML='';
    }
  }catch(e){
    area.innerHTML='';
  }
}

async function syncJobToGoogleCalendar(jobId){
  const btn=document.getElementById('btn-sync-gcal');
  if(!btn)return;
  await loadFormData();
  const collabsWithCal=COLLABS_LIST.filter(c=>c.google_calendar_id);
  if(collabsWithCal.length===0){
    alert('Nessun collaboratore ha un Google Calendar ID configurato. Aggiungilo nella sezione Team.');
    return;
  }
  let calendarId;
  if(collabsWithCal.length===1){
    calendarId=collabsWithCal[0].google_calendar_id;
  }else{
    const options=collabsWithCal.map((c,i)=>`${i+1}. ${c.name} (${c.google_calendar_id})`).join('\n');
    const choice=prompt(`Seleziona il calendario su cui sincronizzare:\n${options}\n\nInserisci il numero:`);
    if(!choice)return;
    const idx=parseInt(choice)-1;
    if(isNaN(idx)||idx<0||idx>=collabsWithCal.length){alert('Selezione non valida');return;}
    calendarId=collabsWithCal[idx].google_calendar_id;
  }
  btn.disabled=true;
  btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>Sincronizzazione...';
  try{
    const res=await fetch(`/api/calendar/sync-job/${jobId}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({calendar_id:calendarId})
    });
    const data=await res.json();
    if(!res.ok){
      alert('Errore sincronizzazione: '+(data.message||'Errore sconosciuto'));
    }else{
      const msg=`Sincronizzazione completata!\n${data.synced_phases} fasi sincronizzate${data.errors>0?`, ${data.errors} errori`:''}`;
      alert(msg);
      loadSyncStatus(jobId);
    }
  }catch(err){
    alert('Errore di rete nella sincronizzazione');
    console.error('Sync error:',err);
  }finally{
    btn.disabled=false;
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>Sincronizza Google Calendar';
  }
}

async function init(){
  document.getElementById('jobs-list').innerHTML='<div class="empty-state">Caricamento commesse...</div>';
  await loadData();
  filteredJobs=[...JOBS];
  const clientFilter=document.getElementById('filter-client');
  clientFilter.innerHTML='<option value="">Tutti i clienti</option>';
  const uniqueClients=[...new Set(JOBS.map(j=>j.client).filter(c=>c&&c!=='—'))].sort();
  uniqueClients.forEach(name=>{
    const opt=document.createElement('option');
    opt.value=name;opt.textContent=name;
    clientFilter.appendChild(opt);
  });
  updateStats();
  renderJobs();
}

function exportJobsCSV() {
  const headers = ['Codice','Titolo','Cliente','Tipo','Priorità','Stato','Categoria','Team','Data inizio','Scadenza','Giorni rimanenti','Note'];
  const statusLabels = {TODO:'Da fare',IN_PROGRESS:'In lavorazione',WAITING:'In attesa',DONE:'Completata'};
  const rows = [headers];
  const jobsToExport = filteredJobs.length ? filteredJobs : JOBS;
  jobsToExport.forEach(j => {
    const dL = j.dueDate ? getDaysLeft(j.dueDate) : '';
    rows.push([
      j.code || '',
      j.title || '',
      j.client || '',
      j.type || '',
      j.prio || '',
      statusLabels[j.status] || j.status || '',
      j.category || '',
      (j.team || []).join('; '),
      j.startedAt || '',
      j.dueDate || '',
      dL,
      j.notes || ''
    ]);
  });
  const csvContent = rows.map(r => r.map(cell => {
    const s = String(cell == null ? '' : cell);
    if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes(';')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }).join(',')).join('\n');
  const BOM = '\uFEFF';
  const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'commesse.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

init();
